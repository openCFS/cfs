Definition * CoupledPDE;

// Define here the right ordering of 
// the single PDEs.
//
// A Basic definition looks like this:
//
// **********************************
// CoupledPDE = new Definition();
// CoupledPDE->AddPDE("<PDENAME>");
// CoupledPDE->AddPDE("<PDENAME>");
// ....
// CoupledPDE->AddInputCoupling("<PDENAME>", <InputCouplingType>, "<QuantityName>");
// CoupledPDE->AddInputCoupling("<PDENAME>", <InputCouplingType>, "<QuantityName>");
// ...
// CoupledPDEs_.Push_back(CoupledPDE);
// **********************************
//
// Note: <InputCouplingType> is defined in environment.hh


// Coupling Electrostatic-Mechanic (without grid smoothing)
CoupledPDE = new Definition();
CoupledPDE->AddPDE("electrostatic");
CoupledPDE->AddPDE("mechanic");
CoupledPDE->AddInputCoupling("mechanic", RHS, ELEC_FORCE_VWP);
CoupledPDE->AddInputCoupling("electrostatic", COORD, MECH_DISPLACEMENT);
CoupledPDEs_.Push_back(CoupledPDE);


// Coupling Mechanic-Smooth
CoupledPDE = new Definition();
CoupledPDE->AddPDE("mechanic");
CoupledPDE->AddPDE("smooth");
CoupledPDE->AddInputCoupling("smooth", ID_BC, MECH_DISPLACEMENT);
CoupledPDEs_.Push_back(CoupledPDE);


// Coupling MpCCI-Mechanic(Fluid)
CoupledPDE = new Definition();
CoupledPDE->AddPDE("mpcci");
CoupledPDE->AddPDE("mechanic");
CoupledPDE->AddInputCoupling("mechanic", RHS, FLUID_FORCE);
CoupledPDE->AddInputCoupling("mpcci", COORD, MECH_DISPLACEMENT);
CoupledPDEs_.Push_back(CoupledPDE);

// Coupling MpCCI-Mechanic-Acoustic (iterative)
CoupledPDE = new Definition();
CoupledPDE->AddPDE("mpcci");
CoupledPDE->AddPDE("mechanic");
CoupledPDE->AddPDE("acoustic");
CoupledPDE->AddInputCoupling("mechanic", RHS, FLUID_FORCE);
CoupledPDE->AddInputCoupling("mpcci", COORD, MECH_DISPLACEMENT);
CoupledPDE->AddInputCoupling("mechanic", RHS, ACOU_FORCE);
CoupledPDE->AddInputCoupling("acoustic", RHS, MECH_FORCE);
CoupledPDEs_.Push_back(CoupledPDE);


// Coupling Electrostatic-Mechanic-Smoothing
CoupledPDE = new Definition();
CoupledPDE->AddPDE("electrostatic");
CoupledPDE->AddPDE("mechanic");
CoupledPDE->AddPDE("smooth");
CoupledPDE->AddInputCoupling("electrostatic", COORD, SMOOTH_DISPLACEMENT, true);
CoupledPDE->AddInputCoupling("mechanic", RHS, ELEC_FORCE_VWP);
CoupledPDE->AddInputCoupling("smooth", ID_BC, MECH_DISPLACEMENT);
CoupledPDEs_.Push_back(CoupledPDE);

