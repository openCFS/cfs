// Coupling Acoustic-Heat Conduction
CoupledPDE = new Definition();
CoupledPDE->AddPDE("acoustic");
CoupledPDE->AddPDE("heatConduction");
CoupledPDE->AddInputCoupling("heatConduction", RHS, ACOU_POWERDENSITY);
CoupledPDEs_.Push_back(CoupledPDE);

// Coupling Acoustic-NonReflectingBoundaryPDE
CoupledPDE = new Definition();
CoupledPDE->AddPDE("acoustic");
CoupledPDE->AddPDE("nrbc");
CoupledPDE->AddInputCoupling("acoustic", RHS, NRBC_PHI);
CoupledPDE->AddInputCoupling("nrbc", RHS, ACOU_POT_NRBC);
CoupledPDEs_.Push_back(CoupledPDE);


// Coupling Acoustic-BubblePDE
CoupledPDE = new Definition();
CoupledPDE->AddPDE("acoustic");
CoupledPDE->AddPDE("bubble");
CoupledPDE->AddInputCoupling("acoustic", RHS, ACOU_BUBBLE_RHS_VAL, true);
CoupledPDE->AddInputCoupling("acoustic", MAT, BUBBLE_RADIUS, true);
CoupledPDE->AddInputCoupling("acoustic", MAT, BUBBLE_RADIUS_DERIV_1, TRUE);
CoupledPDE->AddInputCoupling("bubble", MAT, ACOU_PRESSURE);
CoupledPDE->AddInputCoupling("bubble", MAT, ACOU_PRESSURE_DERIV_1);
CoupledPDEs_.Push_back(CoupledPDE);

