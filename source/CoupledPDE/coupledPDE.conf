// Coupling Mechanic-Acoustic
CoupledPDE = new Definition();
CoupledPDE->AddPDE("mechanic");
CoupledPDE->AddPDE("acoustic");
CoupledPDE->AddInputCoupling("mechanic", RHS, ACOU_FORCE);
CoupledPDE->AddInputCoupling("acoustic", RHS, MECH_FORCE);
CoupledPDEs_.Push_back(CoupledPDE);


// Coupling Electrostatic-Mechanic-Acoustic
CoupledPDE = new Definition();
CoupledPDE->AddPDE("electrostatic");
CoupledPDE->AddPDE("mechanic");
CoupledPDE->AddPDE("acoustic");
CoupledPDE->AddInputCoupling("mechanic", RHS, ELEC_FORCE_VWP);
CoupledPDE->AddInputCoupling("electrostatic", COORD, MECH_DISPLACEMENT);
CoupledPDE->AddInputCoupling("mechanic", RHS, ACOU_FORCE);
CoupledPDE->AddInputCoupling("acoustic", RHS, MECH_FORCE);
CoupledPDEs_.Push_back(CoupledPDE);

// Coupling Electrostatic-Mechanic-Smoothing-Acoustic
CoupledPDE = new Definition();
CoupledPDE->AddPDE("electrostatic");
CoupledPDE->AddPDE("mechanic");
CoupledPDE->AddPDE("smooth");
CoupledPDE->AddPDE("acoustic");
CoupledPDE->AddInputCoupling("mechanic", RHS, ELEC_FORCE_VWP);
CoupledPDE->AddInputCoupling("electrostatic", COORD, SMOOTH_DISPLACEMENT);
CoupledPDE->AddInputCoupling("mechanic", RHS, ACOU_FORCE);
CoupledPDE->AddInputCoupling("smooth", ID_BC, MECH_DISPLACEMENT);
CoupledPDE->AddInputCoupling("acoustic", RHS, MECH_FORCE);
CoupledPDEs_.Push_back(CoupledPDE);


// Coupling Magnetic-Mechanic-Acoustic
CoupledPDE = new Definition();
CoupledPDE->AddPDE("magnetic");
