#------- Format for output results

format_output = unverg // gmv,unverg

#------- Library that is used for working with the mesh

mesh_library = cfsgrid // gridlib, cfsgrid, netgen 

#------- Number of subdomains

maxnumsd = 1

#------- initialization of pde(acoustic2d, thermal2d, elecst3d)
#--- numsubdomain ----- equation --- material number --------
          1             acoustic2d          10000         
          2             thermal2d           17889

#------- Time steps data

numsteps = 100 // number of time steps
firstdt = 5e-08 // initial timestep size
stepsavebeg = 1 // number of first step for saving results
stepsaveend = 100 // number of last step for saving results
stepsaveincr = 1 // increment in steps for saving results

#------- History: node, for which we store result in file: history.dat

history_node = 100  // if there is no node, then -1 

# -------- Type of integration rules

IntegRules:

tetrahedra = GaussOrder5 // GaussOrder2, GaussOrder3, GaussOrder4, GaussOrder5
triangle = GaussOrder3 // GaussOrder2, GaussOrder3, GaussOrder4, GaussOrder5
rectangle = GaussOrder2 // GaussOrder2, GaussOrder5, GaussOrder7

#------- Parameters for acoustic equation

Acoustic PDE:
   adapttime = yes  // Do you want use adaptivity in time ? (yes, no)
   epsilon = 1e-25 // a tolerance for own algebraic system

   ----- Parameters for CLA++ ---------------------------
   
   eps = 1e-6              // relative accuracy in the precond. energy
   dampiter = 0.7          // damping parameter for Jacobi, SSOR, ...
   maxnumit = 20           // max number of iterations

   solvertype = 2          // RICHARDSON = 1
                           // CG         = 2

   precondtype = 2         // ID    = 1
                           // MG    = 2

   numeqcoarse = 30000     // number equation for coarsing

   amg_alpha = 0.01     // coarsening parameter for amg

   ----- Parameters for time-adaptivity ------------------

   tolrelerr = 0.05 // a tolerance of relative local error
   theta = 0.6     // factor introduced to avoid the new step being rejected
   coarsbeta = 0.9 // factor introduced for strategy of coarsing
   numrepeat = 5   // number of step for strategy of coarsing
   maxdt_=5e-2;    // max allowed timestep
   mindt_=5e-30;   // min allowed timestep
   startrepeat=1;  // number of steps in the beginning of calculation
                       before using adaptivity

  ----- Parameters for Newmark method -------------------

   alpha_NM = 0.0 
   beta_NM = 0.25
   gamma_NM = 0.5   

#------- Parameters for thermal equation

Thermal PDE:
   formulation = 1 // 1 - effective mass formulation
                   // 2 - effective stiffness formulation   

   epsilon = 1e-26 // a tolerance for own algebraic system

   gamma_parabolic = 1.0 // parameter for time intergration method

   ----- Parameters for CLA++ ---------------------------- 

   eps =1e-6;              // relative accuracy in the precond. energy
   dampiter = 0.7;         // damping parameter for Jacobi, SSOR, ...
   maxnumiter = 20;        // max number of iterations

   solvertype = 2;         // RICHARDSON = 1
                           // CG         = 2

   precondtype = 2         // ID    = 1
                           // MG    = 2
   numeqcoarse = 10000     // number equation for coarsing

   amg_alpha = 0.25     // coarsening parameter for amg

#------- Parameters for electrostatic equation in 3d

Elecst3d PDE:

   epsilon = 1e-26 // a tolerance for own algebraic system

   ----- Parameters for CLA++ ----------------------------

   eps =1e-6;              // relative accuracy in the precond. energy
   dampiter = 0.7;         // damping parameter for Jacobi, SSOR, ...
   maxnumiter = 20;        // max number of iterations

   solvertype = 2;         // RICHARDSON = 1
                           // CG         = 2

   precondtype = 2         // ID    = 1
                           // MG    = 2
   numeqcoarse = 10000     // number equation for coarsing

   amg_alpha = 0.1         // coarsening parameter for amg
