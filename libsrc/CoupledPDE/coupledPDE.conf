// Coupling Magnetics-Mechanic (without grid smoothing)
CoupledPDE = new Definition();
CoupledPDE->AddPDE("magnetic");
CoupledPDE->AddPDE("mechanic");
CoupledPDE->AddInputCoupling("mechanic", RHS, MAG_FORCE_LORENTZ);
