CoupledPDE->AddInputCoupling("mechanic", RHS, MAG_FORCE_LORENTZ);
CoupledPDE->AddInputCoupling("acoustic", RHS, MECH_FORCE);
CoupledPDEs_.Push_back(CoupledPDE);

// Coupling Magnetic-Mechanic-Smooth-Acoustic
CoupledPDE = new Definition();
CoupledPDE->AddPDE("magnetic");
CoupledPDE->AddPDE("mechanic");
CoupledPDE->AddPDE("smooth");
CoupledPDE->AddPDE("acoustic");
CoupledPDE->AddInputCoupling("magnetic", COORD, SMOOTH_DISPLACEMENT);
CoupledPDE->AddInputCoupling("mechanic", RHS, ACOU_FORCE);
