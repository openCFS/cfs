#######################################################################
# DOCS STAGE - Documentation jobs
#######################################################################

# build doxygen docu
doxygen:
  stage: docs
  image: $BUILD_ENVIRONMENT_REGISTRY/fedora32:$BUILD_ENVIRONMENT_TAG
  tags:
    - saas-linux-small-amd64
  variables:
    GIT_SUBMODULE_STRATEGY: none
  rules:
    - if: $CFS_PIPELINE_TYPE == "test"
    - if: $CFS_PIPELINE_TYPE == "release" && ( $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH )
    - if: $CFS_PIPELINE_TYPE == "manual"
      when: manual
  before_script:
    - mkdir -p build # create if it does not exist
    - cd build # descend in build
  script:
    # configure with correct generator
    - cmake ..
    # build docu
    - make doc-doxygen
    # pack
    - cd share/doc/developer/doxygen/html
    - tar -czf doxygen-html.tgz *
  after_script:
    - mv build/share/doc/developer/doxygen/html/doxygen-html.tgz doxygen-html.tgz
  artifacts:
    paths:
      - doxygen-html.tgz
    expire_in: 6 hours
  needs: []

#######################################################################
# DEPLOY STAGES
#######################################################################

cdash:report:
  stage: deploy
  tags: # add a tag since some runners refuse to run un-tagged jobsgit add .gi  
    - saas-linux-small-amd64
  # switch off cloning any code
  variables:
    GIT_SUBMODULE_STRATEGY: none
    GIT_STRATEGY: none
  rules:
    - if: $CFS_PIPELINE_TYPE == "test"
      allow_failure: true # only for info
    - if: $CFS_PIPELINE_TYPE == "manual"
      when: manual
      allow_failure: true # only for info
  cache: {}
  after_script: []
  before_script: []
  script:
    - echo "see failed tests for '${CI_COMMIT_REF_SLUG}' on http://movm.mi.uni-erlangen.de/cdash/queryTests.php?project=CFS&filtercombine=and&filtercombine=and&filtercombine=and&filtercombine=and&filtercount=2&showfilters=1&filtercombine=and&field1=buildname&compare1=65&value1=${CI_COMMIT_REF_SLUG}&field2=status&compare2=61&value2=Failed"
  environment:
    name: CDash/$CI_COMMIT_REF_SLUG
    url: http://movm.mi.uni-erlangen.de/cdash/queryTests.php?project=CFS&filtercount=2&filtercombine=and&field1=buildname&compare1=65&value1=$CI_COMMIT_REF_SLUG&field2=status&compare2=61&value2=Failed
    auto_stop_in: 1 week
  dependencies: []

.deploy_rules: &deploy_rules
  only:
    refs:
      - master # only for refs pushed to master
    variables:
      # use variables to limit deploy jobs for mdmt to pipelines from the corresponding namespace
      # see the default variales https://docs.gitlab.com/ee/ci/variables/#predefined-variables-environment-variables
      - $CI_PROJECT_NAMESPACE == "cfs"
  tags:
    - linux
    - mdmt
  stage: deploy
  cache: {}
  after_script: []
  before_script: []
  # switch off cloning any code
  variables:
    GIT_SUBMODULE_STRATEGY: none
    GIT_STRATEGY: none

pages:
  stage: deploy
  tags:
    - saas-linux-small-amd64
  # switch off cloning any code
  variables:
    GIT_SUBMODULE_STRATEGY: none
    GIT_STRATEGY: none
  rules:
    # only for release pipelines in our namespace
    - if: $CFS_PIPELINE_TYPE == "release" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PROJECT_NAMESPACE == "openCFS"
  dependencies:
    - linux:gcc14-musl
    - doxygen
  script:
    - mkdir -p public # create public dir
    # publish XML scheme
    - tar -xzvf "build/CFS-$CI_COMMIT_REF_SLUG-Linux.tar.gz" # extract the build (for XML schema)
    - cp -r "CFS-$CI_COMMIT_SHA-Linux/share/xml" "public/." # publish XML scheme
    # publish the builds
    - mv "build/CFS-$CI_COMMIT_REF_SLUG-Linux.tar.gz" "public/." # move to public
    # - mv "build/CFS-$CI_COMMIT_REF_SLUG-Windows.zip" "public/." # windows is too large
    # publish doxygen
    - mkdir -p public/doxygen
    - tar -xzf doxygen-html.tgz -C public/doxygen
  artifacts:
    paths:
      - public
  cache: {}
  after_script: []
  before_script: []

.package-release_common: &package-release_common
  stage: deploy
  variables:
    # switch off cloning any code and add common variables
    GIT_SUBMODULE_STRATEGY: none
    GIT_STRATEGY: none
    # see https://docs.gitlab.com/ee/user/packages/generic_packages/index.html for PACKAGE_REGISTRY_URL format
    #                                                    projects/:id/packages/generic/:package_name/:package_version/:file_name
    PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/openCFS/${CI_COMMIT_TAG}"
    LINUX_ARCHIVE: "CFS-${CI_COMMIT_TAG}-Linux.tar.gz"
    WINDOWS_ARCHIVE: "CFS-${CI_COMMIT_TAG}-Windows.zip"
  rules:
    # Run this job when a tag is created
    - if: ( $CFS_PIPELINE_TYPE == "release" ) && $CI_COMMIT_TAG && ( $CI_PROJECT_NAMESPACE == "openCFS" )
  cache: {}
  after_script: []
  before_script: []
  needs:
    - linux:gcc14-musl
    - windows:MSVC2022-Ifort2021

repack-release: # publish release packages (when a tag is pushed)
  extends: .package-release_common
  image: alpine
  #rules:
  #  # repack only for tags
  #  - $CI_COMMIT_TAG && $CFS_PIPELINE_TYPE == "release" && $CI_PROJECT_NAMESPACE == "openCFS"
  script:
    # debug
    - echo "CI_COMMIT_TAG=$CI_COMMIT_TAG"
    - echo "CI_COMMIT_REF_SLUG=$CI_COMMIT_REF_SLUG"
    # linux
    - tar -xzvf "build/CFS-$CI_COMMIT_REF_SLUG-Linux.tar.gz" # extract the build
    - mv "CFS-$CI_COMMIT_SHA-Linux" "CFS-$CI_COMMIT_TAG-Linux" # rename
    - tar -czvf "build/${LINUX_ARCHIVE}" CFS-$CI_COMMIT_TAG-Linux # repack
    # windows
    - apk add --no-cache zip # install zip
    - unzip "build/CFS-$CI_COMMIT_REF_SLUG-Windows.zip" # extract
    - mv "CFS-$CI_COMMIT_SHA-win64" "CFS-$CI_COMMIT_TAG-Windows" # rename
    - zip -r -9 "build/${WINDOWS_ARCHIVE}" CFS-$CI_COMMIT_TAG-Windows # repack
  artifacts:
    paths:
      - build/$LINUX_ARCHIVE
      - build/$WINDOWS_ARCHIVE

package: # publish package for default branch
  extends: .package-release_common
  image: curlimages/curl:latest
  rules:
    # if it is a tag, we repack the archives such that the top-level-directory is called CFS-<TAG>-<platform>.<ext> 
    - if: ( $CFS_PIPELINE_TYPE == "release" ) && $CI_COMMIT_TAG && $CI_PROJECT_NAMESPACE == "openCFS"
      needs: ['repack-release']
    # otherwise we publish build artifacts directly (we edit the variable names to accept default artifacts)
    - if: ( $CFS_PIPELINE_TYPE == "release" ) && ( $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH )  
      variables:
        LINUX_ARCHIVE: "CFS-$CI_COMMIT_REF_SLUG-Linux.tar.gz"
        WINDOWS_ARCHIVE: "CFS-$CI_COMMIT_REF_SLUG-Windows.zip"
        PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/openCFS/${CI_COMMIT_REF_SLUG}"
  script:
    - echo "publishing ${LINUX_ARCHIVE} and ${WINDOWS_ARCHIVE} to ${PACKAGE_REGISTRY_URL}"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "build/${LINUX_ARCHIVE}" "${PACKAGE_REGISTRY_URL}/${LINUX_ARCHIVE}"
    - echo "download Linux build at ${PACKAGE_REGISTRY_URL}/${LINUX_ARCHIVE}"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "build/${WINDOWS_ARCHIVE}" "${PACKAGE_REGISTRY_URL}/${WINDOWS_ARCHIVE}"
    - echo "download Windows build at ${PACKAGE_REGISTRY_URL}/${WINDOWS_ARCHIVE}"

release:
  extends: .package-release_common
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - package
  script:
    - echo "${CI_COMMIT_TAG_MESSAGE}" > description.md
    - cat description.md
  release:  # See https://docs.gitlab.com/ee/ci/yaml/#release for available properties
    tag_name: '$CI_COMMIT_TAG'
    description: './description.md'
    assets:
      # add links to downloads
      # format: https://gitlab.com/openCFS/cfs/-/releases/:release/downloads/:filepath
      # or permanent link to the latest version: https://gitlab.com/openCFS/cfs/-/releases/permalink/latest/downloads/:filepath
      links:
        - name: 'Linux binary (tar.gz)'
          url: "${PACKAGE_REGISTRY_URL}/${LINUX_ARCHIVE}" # uploaded by 'package' job before
          filepath: '/CFS-Linux.tar.gz' # optional, but required for 'latest', defines the URL (see https://docs.gitlab.com/ee/user/project/releases/release_fields.html#permanent-links-to-release-assets)
          link_type: 'package' # optional, defines the section and icon (see https://docs.gitlab.com/ee/user/project/releases/release_fields.html#link-types)
        - name: 'Windows binary (zip)'
          url: "${PACKAGE_REGISTRY_URL}/${WINDOWS_ARCHIVE}" # uploaded by 'package' job before
          filepath: '/CFS-Windows.zip' # optional, but required for 'latest', defines the URL (see https://docs.gitlab.com/ee/user/project/releases/release_fields.html#permanent-links-to-release-assets)
          link_type: 'package' # optional, defines the section and icon (see https://docs.gitlab.com/ee/user/project/releases/release_fields.html#link-types)
