# This file is used to define the CI pipeline for GitLab
variables:
  GIT_SUBMODULE_STRATEGY: recursive

stages:
  - build # config and build combined
  - test # we may have several test configs for one build
  - clear_and_rebuild

# this is run before/after every step
before_script:
  - mkdir -p build # make build dir
  - cd build
  - cat Testing/TAG || echo "no TAG"
after_script:
  - cd build
  - cat Testing/TAG || echo "no TAG"
  - ls Testing
  - ctest -D ExperimentalSubmit --track Gitlab -V

# cache the build files see https://docs.gitlab.com/ee/ci/caching/index.html
# use the ref-name, e.g. `master` as key -> same for sucessive builds
# it is stored as a zip archive and extracted before each stage - this takes time,
# thus we combine the build and configure step
# the key is used to define which chache is used for which job.
cache:
  key: ${CI_COMMIT_REF_NAME}
  paths:
    - build

.start:
  stage: start_dashboard
  script:
    - rm -rf Testing # start with clean testing dir
    - rm -f DartConfiguration.tcl # remove old config
    - cmake -DCTEST_GIT_UPDATE_CUSTOM:STRING="git;status" .. # configure with git update command
    # by default CTest does 'git fetch' which fails due to insufficient rights
    - ctest -D ExperimentalStart --track Gitlab -V
  artifacts:
    paths:
      - build/DartConfiguration.tcl
      - build/Testing/TAG
      - build/Testing/Temporary/*
    expire_in: 1 week

.configure:
  stage: configure
  script:
    - ctest -D ExperimentalConfigure --track Gitlab -V
  # provides artifacts in gitlab (can be downloaded)
  artifacts:
    paths:
      - build/CMakeCache.txt
      - build/Makefile
    expire_in: 1 week

build:linux:
  stage: build
  script:
    - rm -f CMakeCache.txt # clear old cache
    - cmake -DCTEST_GIT_UPDATE_CUSTOM:STRING="git;status" .. # configure with git update command
    # by default CTest does 'git fetch' which fails due to insufficient rights
    - ctest -D ExperimentalStart --track Gitlab -V
    - ctest -D ExperimentalConfigure --track Gitlab -V
    - ctest -D ExperimentalSubmit --track Gitlab # intermittent submit to get live CDash results
    - ctest -D ExperimentalBuild --track Gitlab -V
  artifacts:
    paths:
      - build/DartConfiguration.tcl
      - build/Testing/TAG # needed for test submitssion
      - build/Testing/Temporary/* # debug only ?
    expire_in: 1 week

test:stdconf:
  stage: test
  script:
    - ctest -D ExperimentalTest --track Gitlab
  dependencies:
    - build:linux

test:t1:
  stage: test
  when: manual # only run on demand
  script:
    - cmake -DCFS_TESTSUITE_THREADS:STRING=1 . # re-configure
    - ctest -D ExperimentalStart --track Gitlab -V # put result into new dashboard
    - ctest -D ExperimentalTest --track Gitlab
  dependencies:
    - build:linux

clear_and_rebuild:
  stage: clear_and_rebuild
  when: manual
  script:
    - rm -rf * # clear all in build
    - cmake -DCTEST_GIT_UPDATE_CUSTOM:STRING="git;status" .. # configure to generate DartConfig
    - ctest -D Experimental --track Gitlab -V
  after_script: [] # override global
