# This file is used to define the CI pipeline for GitLab
# https://docs.gitlab.com/ee/ci/yaml
variables:
  GIT_STRATEGY: fetch # this is faster than clone and should re-use a workspace
  GIT_SUBMODULE_STRATEGY: recursive

# stages in the pipeline run in succession
stages:
  - build # config and build combined
  - test # we may have several test configs for one build
  - deploy

# determines when the pipeline runs:
#  - for the master branch
#  - for branches/tags called "test-*" 
.default_pipeline_rules: &default_pipeline_rules
  only:
    refs:
      - master
      - /^test-.*$/

# this is run before/after every step
# we should be in the build dir and ready to run ctest
before_script:
  - mkdir -p build # make build dir
  - cd build
  - cat Testing/TAG || echo "no TAG" # debug
  - rm -f CMakeCache.txt # clear old cache
  - cmake -DCTEST_GIT_UPDATE_CUSTOM:STRING="git;status" .. # configure with git update command
# cleanup and CDash submission - in after to always submit a result, also if one 'script' command failed   
after_script:
  - cd build
  - cat Testing/TAG || echo "no TAG" # debug
  - ctest -D ExperimentalSubmit --track Gitlab -V
  - rm CMakeCache.txt

# cache the build files see https://docs.gitlab.com/ee/ci/caching/index.html
# use the ref-name, e.g. `master` as key -> same for sucessive builds
# it is stored as a zip archive and extracted before each stage - this takes time,
# thus we combine the build and configure step
# the key is used to define which chache is used for which job.
cache:
  key: ${CI_COMMIT_REF_NAME}
  paths:
    - build/cfsdeps/cache
    - build/bin
    - build/lib*
    - build/Testing

#################################################
# BUILD STAGE
#################################################
# Here we define the build jobs, if one fails we do not need to test

.default_build_job: &default_build_job
  script:
    - ctest -D ExperimentalStart --track Gitlab -V
    - ctest -D ExperimentalUpdate --track Gitlab -V
    - ctest -D ExperimentalConfigure --track Gitlab -V
    - ctest -D ExperimentalSubmit --track Gitlab # intermittent submit to get live CDash results
    - ctest -D ExperimentalBuild --track Gitlab -V | tee build.out
    - ctest -D ExperimentalSubmit --track Gitlab
    - ctest -D ExperimentalTest -R Install --track Gitlab # only do the install testing
    # check the coding_score
    - errors=$(grep '[0-9]\+ Compiler errors' build.out | sed 's|.\+\([0-9]\+\).\+|\1|')
    - warnings=$(grep '[0-9]\+ Compiler warnings' build.out | sed 's|.\+\([0-9]\+\).\+|\1|')
    - insertions=$(git diff --stat HEAD HEAD~1 | tail -n 1 | sed 's|.\+\([0-9]\+\) insertion.\+|\1|')
    - deletions=$(git diff --stat HEAD HEAD~1 | tail -n 1 | sed 's|.\+\([0-9]\+\) deletion.\+|\1|')
    - echo "$errors errors, $warnings warnings, $insertions insertions, $deletions deletions"
    - awk "BEGIN {printf \"coding_score=%.2f\n\", (1-(2*$errors+$warnings)/($insertions+$deletions))*100}"
  coverage: '/coding_score=(\d+[.]\d+)/'
  artifacts:
    paths: # just an example
      - build/DartConfiguration.tcl
      - build/CFS-*-Linux.tar.gz # the packed binaries for distribution
    expire_in: 2h
  <<: *default_pipeline_rules

build:gcc4: # eventually we should have one job for each required configuration
  stage: build
  tags:
    - gcc4
  <<: *default_build_job

build:gcc6:
  stage: build
  tags:
    - gcc6
  before_script:
    - mkdir -p build # create if it does not exist
    - cd build # descend in build
    - rm -f CMakeCache.txt # clear old cache
    # try software collection, and if it fails use native gcc
    # check gcc version via grep
    - scl enable devtoolset-6 -- gcc --version | grep '6\.[0-9]\.[0-9]' || gcc --version | grep '6\.[0-9]\.[0-9]'
    # initial config with devtoolset
    - scl enable devtoolset-6 -- cmake -DCTEST_GIT_UPDATE_CUSTOM:STRING="git;status" .. || cmake -DCTEST_GIT_UPDATE_CUSTOM:STRING="git;status" ..
  <<: *default_build_job

build:gcc7:
  stage: build
  tags:
    - gcc7
  when: manual
  before_script:
    - mkdir -p build # create if it does not exist
    - cd build # descend in build
    - rm -f CMakeCache.txt # clear old cache
    # try software collection, and if it fails use native gcc
    # check gcc version via grep
    - scl enable devtoolset-7 -- gcc --version | grep '7\.[0-9]\.[0-9]' || gcc --version | grep '7\.[0-9]\.[0-9]'
    # initial config with devtoolset
    - scl enable devtoolset-7 -- cmake -DCTEST_GIT_UPDATE_CUSTOM:STRING="git;status" .. || cmake -DCTEST_GIT_UPDATE_CUSTOM:STRING="git;status" ..
  <<: *default_build_job

# re-build everything
complete-build:linux:
  stage: build
  tags:
    - linux
  when: manual
  before_script:
    - rm -rf build # clear
    - mkdir build
    - cd build
    - cmake -DCTEST_GIT_UPDATE_CUSTOM:STRING="git;status" ..
  <<: *default_build_job


#################################################
# TEST STAGE
#################################################
# the test stage might run on a different runner than the build, thus
# the binaries are shared via the gitlab server (artifacts/dependencies)

# test preparation starts by extracting the build files from assets
.job_template: &test_prepare
  before_script:
    - mkdir -p build
    - cd build # descend in build
    - ls # debug
    - tar -xzvf "CFS-"$CI_COMMIT_SHA"-Linux.tar.gz" --strip-components=1 # extract to correct location

# [global setting](https://docs.gitlab.com/ee/user/project/pipelines/settings.html#test-coverage-parsing) applies to last test only
# https://docs.gitlab.com/ee/ci/yaml/#coverage
# in the format '/REGEX/' - one can test REGEX at http://rubular.com/
.ctest_coverage: &ctest_coverage
  coverage: '/(\d+\%)\s+tests\s+passed,\s+\d+\s+tests?\s+failed\s+out\s+of\s+\d+/'

# this is the config that has to pass
.test_stable: &test_stable
  script:
    - cmake -DGITLAB_TEST_TAG:STRING=`date +%Y%m%d-%H%M` -DCFS_TESTSUITE_THREADS=1 -DCFS_TESTSUITE_CFSTOOL_MODE=relL2diff .. # re-configure with most robust test config
    - ctest -D ExperimentalTest -E "Instal|ElecTherm_ElTh_NMGtransient|Preisach|CFSdat_FFT_2D" --track Gitlab # exclude the install step and the failing tests
  <<: *default_pipeline_rules

# test everything
.test_all_multicore: &test_all_multicore
  script:
    - cmake -DGITLAB_TEST_TAG:STRING=`date +%Y%m%d-%H%M` -DCFS_TESTSUITE_CFSTOOL_MODE=relL2diff .. # multicore
    - ctest -D ExperimentalTest -E Install --track Gitlab # exclude the install step
  <<: *default_pipeline_rules

# now we define the actual tests, i.e. we decide which build we want to test
# the build is taken from the dependecies
stable:gcc4:linux:
  tags:
    - linux
  stage: test
  <<: *test_prepare
  <<: *test_stable
  <<: *ctest_coverage 
  dependencies:
    - build:gcc4

# pre-pend the jobs with x as they are sorted alphabetically
x-all:gcc4:linux: # if the machine has multiple
  tags:
    - linux
  stage: test
  <<: *test_prepare
  <<: *test_all_multicore
  <<: *ctest_coverage  
  allow_failure: true # we know some tests will fail on multi-core runs, so this will not stop the pipeline
  dependencies:
    - build:gcc4

x-all:gcc6:linux: # if the machine has multiple
  tags:
    - linux
  stage: test
  when: manual
  <<: *test_prepare
  <<: *test_all_multicore
  <<: *ctest_coverage  
  allow_failure: true # we know some tests will fail on multi-core runs, so this will not stop the pipeline
  dependencies:
    - build:gcc6

x-all:gcc7:linux: # if the machine has multiple
  tags:
    - linux
  stage: test
  when: manual
  <<: *test_prepare
  <<: *test_all_multicore
  <<: *ctest_coverage  
  allow_failure: true # we know some tests will fail on multi-core runs, so this will not stop the pipeline
  dependencies:
    - build:gcc7

#################################################
# DEPLOY STAGES
#################################################

.deploy_rules: &deploy_rules
  only:
    refs:
      - master # only for refs pushed to master
      - /.*-gitlab-runner-integration/ # only for testing
  tags:
    - linux
    - mdmt
  stage: deploy
  after_script: []
  before_script: []
  
copy_to_draco:
  dependencies:
    - build:gcc4
  script:
    # copy over via scp
    - scp "build/CFS-$CI_COMMIT_SHA-Linux.tar.gz" "draco:/opt/programs/cfs_master/CFS-$CI_COMMIT_SHA-Linux.tar.gz" || echo "WARNING: source file not found"
    # extract on draco by ssh
    - ssh draco "tar -xzf /opt/programs/cfs_master/CFS-$CI_COMMIT_SHA-Linux.tar.gz -C /opt/programs/cfs_master"
    # set the new symlink and replace the old one in one atomic operation
    - ssh draco "cd /opt/programs/cfs_master/; ln -s CFS-$CI_COMMIT_SHA-Linux new; mv -fT new latest; ./cleanup.sh"    
  environment:
    name: share_programs
  <<: *deploy_rules
