python:linux:
  image: $BUILD_ENVIRONMENT_REGISTRY/ubuntu22.04:$BUILD_ENVIRONMENT_TAG
  extends: .ctest_default #extension can be found in hidden_jobs.yml
  tags:
    - saas-linux-small-amd64
  stage: test
  rules:
    # activate in schedule
    - if: $CFS_PIPELINE_TYPE == "nightly"
    # run when we have changes in python files
    - if: $CFS_PIPELINE_TYPE == "test"
      changes:
        paths:
          - "**/*.py"
        compare_to: $COMPARE_CHANGES_TO
    - if: $CFS_PIPELINE_TYPE == "manual"
      changes:
        paths:
          - "**/*.py"
        compare_to: $COMPARE_CHANGES_TO
      when: manual
    # add a manual job if there were no changes
    - if: $CFS_PIPELINE_TYPE == "test" || $CFS_PIPELINE_TYPE == "manual"
      allow_failure: true
      when: manual
  before_script:
    - git rev-list -n 1 HEAD -- || echo "git failed, should return ${CI_COMMIT_SHA}" # debug for command run by CTestUpdate
    - mkdir -p build
    - cd build
    - !reference [.cmake_test_or_install,script] # optionally install cmake if not present
    - cmake -DTESTSUITE_CFS=OFF -DCFS_INSTALL_DIR=$CI_PROJECT_DIR/build $CI_PROJECT_DIR/Testsuite # switch off CFS
  script:
    - ctest -D ExperimentalStart --track $CDASH_TRACK # start a new dashboard
    - ctest -D ExperimentalUpdate --track $CDASH_TRACK # SHA is visible in CDash
    - ctest -D ExperimentalConfigure --track $CDASH_TRACK # show config
    - ctest -D ExperimentalTest -R PYTHON --track $CDASH_TRACK --output-junit ${CI_JOB_ID}.xml
  dependencies: [] # python tests do not need any dependencies (no cfs required)
  <<: *after_cdash_submit #extension can be found in hidden_jobs.yml
  needs: [] # run as soon as possible



###########################################################
# Performance tests (with child pipeline to enabel dynamic parallel execution)
###########################################################

#Generate dynamic child pipeline in test stage
generate_performance_jobs:
  tags:
    - saas-linux-small-amd64
  stage: test
  variables:
    IMAGE: ubuntu22.04
    TEST_CONFIG_OPTIONS: -DTESTSUITE_THREADS=1
    CTEST_OPTIONS: "-L performance"
  <<: *test_generic #extension can be found in hidden_jobs.yml
  script:
    # -------------------------------------------
    # Step 1: Get all performance tests
    # Clean up leading/trailing spaces
    # -------------------------------------------
    - cmake -DCFS_INSTALL_DIR=${CI_PROJECT_DIR}/build ${TEST_CONFIG_OPTIONS} ${CI_PROJECT_DIR}/Testsuite
    - |
      mapfile -t perf_tests < <(
        ctest -N -L performance |
        grep "Test #" |
        awk -F': ' '{gsub(/^[ \t]+|[ \t]+$/, "", $2); print $2}'
      )
      echo "Found ${#perf_tests[@]} performance tests"

    # -------------------------------------------
    # Step 2: Start generating the child pipeline YAML
    # -------------------------------------------
    - echo "Automatically adding ${#perf_tests[@]} performance tests"
    - echo "include:" >> generated-perf-jobs.yml
    - echo "  - local: .gitlab/ci/hidden_jobs.yml" >> generated-perf-jobs.yml
    - echo "stages:" >> generated-perf-jobs.yml
    - echo "  - performance_test" >> generated-perf-jobs.yml

    # -------------------------------------------
    # Step 3: Generate one job per performance test
    # Use a heredoc (<<EOF) for multi-line YAML
    # Variables are safely expanded inside the heredoc
    # -------------------------------------------
    - |
      for test in "${perf_tests[@]}"; do
        # Sanitize the job name
        base_name=$(echo "$test" | tr -c 'a-zA-Z0-9' '_')
        short_name=$(echo "$base_name" | cut -c1-50)
        hash=$(echo -n "$test" | md5sum | cut -c1-6)
        job_name="${short_name}_${hash}"

        # Append job lines with echo
        echo "${job_name}:" >> generated-perf-jobs.yml
        echo "  stage: performance_test" >> generated-perf-jobs.yml
        echo "  extends: .test_generic" >> generated-perf-jobs.yml
        echo "  variables:" >> generated-perf-jobs.yml
        echo "    IMAGE: ubuntu22.04" >> generated-perf-jobs.yml
        echo "    TEST_CONFIG_OPTIONS: -DTESTSUITE_THREADS=2" >> generated-perf-jobs.yml
        # Use double quotes and escape any special YAML chars
        echo "    CTEST_OPTIONS: \"-R ${test//\"/\\\"}\"" >> generated-perf-jobs.yml
        echo "  needs:" >> generated-perf-jobs.yml
        echo "    - linux:gcc14-musl" >> generated-perf-jobs.yml
      done
    - echo "Added tests!"
  artifacts:
    paths:
      - build/generated-perf-jobs.yml
    expire_in: 1h
  needs:
    - linux:gcc14-musl

###########################################################
# TEST_PERFORMANCE STAGE: Trigger the child pipeline created before
###########################################################
performance_tests:
  stage: test_performance
  needs:
    - job: generate_performance_jobs
      artifacts: true
  trigger:
    include:
      - artifact: build/generated-perf-jobs.yml # dynamically created
        job: generate_performance_jobs


