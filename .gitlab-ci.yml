  stage: test
  rules: # overwrite rules given via extends: .test_generic
    - !reference [.max_rules, rules]
  variables:
    IMAGE: centos7-gcc7
    BUILD_NAME: "GCC7 maximal / unstable serial"
    TEST_CONFIG_OPTIONS: -DTESTSUITE_THREADS=1
    CTEST_OPTIONS: "-L unstable"
  needs:
    - linux:gcc7max

stable_par:gcc7closed:linux:
  extends: .test_generic
  tags:
    - saas-linux-small-amd64
  stage: test
  rules: # overwrite rules given via extends: .test_generic
    - !reference [linux:gcc7closed, rules]
  variables:
    IMAGE: centos7-gcc7
    BUILD_NAME: "GCC7 closed / stable opt parallel"
    TEST_CONFIG_OPTIONS: "-DTESTSUITE_THREADS=2 -DTESTSUITE_PYTHON=OFF "
