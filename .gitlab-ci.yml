    - linux:gcc7closed

stable_ser:gcc14-musl:linux:
  tags:
    - saas-linux-small-amd64
  stage: test
  variables:
    IMAGE: ubuntu22.04
    BUILD_NAME: "GCC14-MUSL / stable serial"
    TEST_CONFIG_OPTIONS: -DTESTSUITE_THREADS=1
    CTEST_OPTIONS: "-LE unstable|broken"
  <<: *test_generic
  needs:
    - linux:gcc14-musl

stable_par:gcc14-musl:linux:
  tags:
    - saas-linux-small-amd64
  stage: test
  variables:
    IMAGE: ubuntu22.04
    BUILD_NAME: "GCC14-MUSL / stable parallel"
    TEST_CONFIG_OPTIONS: -DTESTSUITE_THREADS=2
    CTEST_OPTIONS: "-LE unstable|broken"
  <<: *test_generic
  needs:
    - linux:gcc14-musl

