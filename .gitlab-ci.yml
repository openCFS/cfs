# This file is used to define the CI pipeline for GitLab
variables:
  GIT_SUBMODULE_STRATEGY: recursive

stages:
  - start_dashboard
  - configure
  - build
  - test
  - clear_and_rebuild

# this is run before/after every step
before_script:
  - mkdir -p build # make build dir
  - cd build
  - cat Testing/TAG || echo "no TAG"
  - pwd
  - ls
after_script:
  - pwd
  - cd build
  - ls
  - ctest -D ExperimentalSubmit --track Gitlab -V

# cache the build files see https://docs.gitlab.com/ee/ci/caching/index.html
# use the ref-name, e.g. `master` as key -> same for sucessive builds
cache:
  key: ${CI_COMMIT_REF_NAME}
  paths:
    - build

start:
  stage: start_dashboard
  script:
    - rm -rf Testing # start with clean testing dir
    - ls
    - rm -f DartConfiguration.tcl # remove old config
    - cmake -DCTEST_GIT_UPDATE_CUSTOM:STRING="git;status" .. # configure with git update command
    # by default CTest does 'git fetch' which fails due to insufficient rights
    - cat DartConfiguration.tcl # debug
    - ctest -D ExperimentalStart --track Gitlab -V
  artifacts:
    paths:
      - build/DartConfiguration.tcl
      - build/Testing/TAG
      - build/Testing/Temporary/*
    expire_in: 1 week

configure:
  stage: configure
  script:
    - ctest -D ExperimentalConfigure --track Gitlab -V
  # provides artifacts in gitlab (can be downloaded)
  artifacts:
    paths:
      - build/CMakeCache.txt
      - build/Makefile
    expire_in: 1 week

build:
  stage: build
  script:
    - ctest -D ExperimentalBuild --track Gitlab -V

test:
  stage: test
  script:
    - ctest -D ExperimentalTest --track Gitlab -V

clear_and_rebuild:
  stage: clear_and_rebuild
  when: manual
  script:
    - rm -rf * # clear all in build
    - cmake -DCTEST_GIT_UPDATE_CUSTOM:STRING="git;status" .. # configure to generate DartConfig
    - ctest -D Experimental --track Gitlab -V
  after_script: [] # override global
