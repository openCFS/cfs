# This file is used to define the CI pipeline for GitLab
variables:
  GIT_SUBMODULE_STRATEGY: recursive

stages:
  - start_dashboard
  - configure
  - build
  - test
  - submit

# this is run before every step
before_script:
  - mkdir -p build # make build dir
  - cd build
  - pwd
  - ls

# cache the build files see https://docs.gitlab.com/ee/ci/caching/index.html
# use the ref-name, e.g. `master` as key -> same for sucessive builds
cache:
  key: ${CI_COMMIT_REF_NAME}
  paths:
    - build

start:
  stage: start_dashboard
  script:
    - ls CMakeCache.txt || cmake -DCTEST_GIT_UPDATE_CUSTOM="git;status" .. # configure with git update command
    # by default CTest does 'git fetch' which fails due to insufficient rights
    - ctest -D ContinuousStart -VV
    - ctest -D ContinuousUpdate -VV

# only include a config step for the start
configure:
  stage: configure
  script:
    - rm -f CMakeCache.txt # clear any old chache
    - ctest -D ContinuousConfigure -V
  # provides artifacts in gitlab (can be downloaded)
  artifacts:
    paths:
      - build/CMakeCache.txt
    expire_in: 1 week

build:
  stage: build
  script:
    - ctest -D ContinuousBuild -V

test:
  stage: test
  script:
    - ctest -D ContinuousTest -V

submit:
  stage: submit
  script:
    - ctest -D ContinuousSubmit -V
  when: always
