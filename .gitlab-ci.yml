    CTEST_OPTIONS: "-L unstable"
  <<: *test_generic
  needs:
    - linux:gcc7min

stable_par:gcc7max:linux:
  extends: .test_generic
  tags:
    - saas-linux-small-amd64
  stage: test
  rules: # overwrite rules given via extends: .test_generic
    - !reference [.max_rules, rules]
  variables:
    IMAGE: centos7-gcc7
    BUILD_NAME: "GCC7 maximal / stable parallel"
    TEST_CONFIG_OPTIONS: -DTESTSUITE_THREADS=2
    CTEST_OPTIONS: "-LE unstable|broken"
