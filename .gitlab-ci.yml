# This file is used to define the CI pipeline for GitLab
# https://docs.gitlab.com/ee/ci/yaml
#
# Syntax tipps:
# * check on https://cfs-dev.mdmt.tuwien.ac.at/ci/lint
# * do not use a command `echo "warning: the : is not allowed in a string"`

# include common stuff to make this file shorter
include:
  - local: .gitlab/ci/hidden_jobs.yml
  - local: .gitlab/ci/linux.yml
  - local: .gitlab/ci/windows.yml
  # this switches the CACHE_POLICY by including the file with a variable definition (and an info job)
  # see https://docs.gitlab.com/ee/ci/yaml/includes.html#merge-method-for-include
  # and https://docs.gitlab.com/ee/ci/yaml/includes.html#use-nested-includes-with-duplicate-include-entries
  - local: .gitlab/ci/cache-default.yml
  # since it is included __after__ the above cache-default, it wins (and variables are overwritten)
  - local: .gitlab/ci/cache-policy-push.yml
    rules:
      - if: $CLEAR_CACHE != null
      - if: $CI_COMMIT_MESSAGE =~ /clear-cache/
      - if: $CI_MERGE_REQUEST_LABELS =~ /clear-cache/
      - if: $CACHE_POLICY == "push" # effectively just add the info job

# https://docs.gitlab.com/ee/ci/variables/#variables-expressions
variables:
  GIT_STRATEGY: fetch # this is faster than clone and should re-use a workspace
  GIT_SUBMODULE_STRATEGY: none # we do not need the testsuite for building
  CDASH_TRACK: Gitlab # will be overwritten by nightly schedule
  CTEST_PROGRESS_OUTPUT: "ON" # makes the ctest output shorter, see https://cmake.org/cmake/help/latest/envvar/CTEST_PROGRESS_OUTPUT.html#envvar:CTEST_PROGRESS_OUTPUT
  # build options for the maximal config
  MAX_CONFIG_OPTIONS: " -DUSE_EMBEDDED_PYTHON=ON -DUSE_CGAL=ON -DUSE_SUITESPARSE=ON -DUSE_EIGEN=ON -DUSE_SGP=ON"
  MUSL_CONFIG_OPTIONS: "-DCMAKE_EXE_LINKER_FLAGS=-static -DMKL_THREADING=gnu_thread" # link statically
  # Select which tag of the build containers we use. Update the tag when there are breaking changes in the conainers!
  # This way pipelines for old CFS-commits can still run on old container versions.
  # see https://gitlab.com/openCFS/build-environment/-/tags
  # or https://hub.docker.com/u/opencfs for the available images
  BUILD_ENVIRONMENT_TAG: 2025.05
  BUILD_ENVIRONMENT_REGISTRY:
    value: "opencfs" # defaults to using docker-hub
    options:
      - "opencfs"
      - "registry.gitlab.com/opencfs/build-environment"
    description: "Container registry to pull from to obtain the build-environment (docker) container images for the Linux builds. Set BUILD_ENVIRONMENT_TAG to specify a image tag to use."
  # configure ccache, see https://ccache.dev/manual/latest.html
  CCACHE_BASEDIR: $CI_PROJECT_DIR/build
  CCACHE_DIR: $CI_PROJECT_DIR/ccache
  CCACHE_SLOPPINESS: "file_macro,locale,time_macros"
  CCACHE_STATSLOG: $CI_PROJECT_DIR/build/ccache.log
  CCACHE_MAXSIZE: 200M
  # set the pipeline type via variable, see https://docs.gitlab.com/ee/ci/yaml/#variablesoptionsq
  CFS_PIPELINE_TYPE:
    value: "test"
    options:
      - "manual"
      - "test"
      - "nightly"
      - "release"
    description: "The type of the pipeline: usually you want 'test', 'manual', or 'nightly'. Other options are for pipeline-experiments only!"
  # all rules:changes:compare_to use this value - it can be set in as a variable when creating a pipeline
  # since branch and MR pipelines show a different behavior without this option, we set it (see https://docs.gitlab.com/ee/ci/yaml/#ruleschanges)
  COMPARE_CHANGES_TO: $CI_DEFAULT_BRANCH # if one does merge requests to a different branch than the default this needs to be changed

# stages in the pipeline run in succession
stages:
  - check
  - platform
  - cfsdeps
  - build
  - test # we may have several test configs for one build
  - test_performance # here we test performance related tests that are too large to include in the standard test environment
  - test_extra # here we test everything that is not required to pass (broken and too unstable stuff)
  - docs
  - deploy

# determine when pipelines are created
# https://docs.gitlab.com/ee/ci/yaml/#workflowrules
# https://docs.gitlab.com/ee/ci/jobs/job_control.html#common-if-clauses-for-rules
# we create pipelines for merge requests, schedules, and the web-ui
# se set the variable CFS_PIPELINE_TYPE to indicate which jobs should be run in which way
#  - test : run a maximum amount of tests automatically
#  - manual : create all tests but set them to manual (default)
#  - release : create jobs for releases
#  - nightly : regular tests for the CDash dashboard
workflow:
  name: "$CFS_PIPELINE_NAME"
  rules:
  # put the most specific rules first - we have a release tag (in the correct format)
  # tags with 20* should be protected in the GitLab repo settings
  - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /20[0-9][0-9][A-Z]/
    variables:
      CFS_PIPELINE_TYPE: "release"
      CFS_PIPELINE_NAME: "Release for tag $CI_COMMIT_TAG"
  # We need pipelines to deploy stuff -> set the 'release' type
  # for tags on the default branch we create releases
  # this will run for accepted merge requests
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE !~ /schedule/
    variables:
      CFS_PIPELINE_TYPE: "release"
      CFS_PIPELINE_NAME: "Release for ${CI_DEFAULT_BRANCH}: $CI_COMMIT_TITLE"
  # We want pipelines to 'test' for merge requests
  # set to manual if the merge request title start with Draft:
  - if: $CI_MERGE_REQUEST_TITLE =~ /^Draft:.*/
    variables:
      CFS_PIPELINE_TYPE: "manual"
      CFS_PIPELINE_NAME: "Manual for MR${CI_MERGE_REQUEST_IID}: $CI_COMMIT_TITLE"
  # run automatically for not-Draft merge requests
  - if: $CI_MERGE_REQUEST_IID
    variables:
      CFS_PIPELINE_TYPE: "test"
      CFS_PIPELINE_NAME: "Test for MR${CI_MERGE_REQUEST_IID}: $CI_COMMIT_TITLE"
  # do not run branch pipelines if a merge request is open (avoid duplicates)
  - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE !~ /web/ && $CI_PIPELINE_SOURCE !~ /schedule/
    when: never
  # run for schedules - this emulates a commit on a branch
  - if: $CI_PIPELINE_SOURCE == "schedule"
    variables:
      CFS_PIPELINE_TYPE: "nightly"
      CFS_PIPELINE_NAME: "Scheduled for branch ${CI_COMMIT_BRANCH}: $CI_COMMIT_TITLE"
  # automatically run if branch name starts or ends with test
  - if: $CI_COMMIT_BRANCH =~ /^test.*$/ || $CI_COMMIT_BRANCH =~ /^.*test$/
    variables:
      CFS_PIPELINE_TYPE: "test"
      CFS_PIPELINE_NAME: "Test for branch ${CI_COMMIT_BRANCH}: $CI_COMMIT_TITLE"
  # honor the CFS_PIPELINE_TYPE from the Web-ui
  - if: $CI_PIPELINE_SOURCE == "web"
    variables:
      CFS_PIPELINE_NAME: "$CFS_PIPELINE_TYPE for ${CI_COMMIT_REF_NAME}: $CI_COMMIT_TITLE"
  # when no rule triggers, no pipeline is created

#################################################
# Check STAGE
#################################################
# the jobs in this stage are purely informational at the moment
# some only get created in certain cases (pipeline-changes) and then fail 
# to generate a warning (they are allowed to fail)

# check the links in markdown files using https://github.com/tcort/markdown-link-check
markdown-link-check:
  extends: .check #extension can be found in hidden_jobs.yml
  image: 
    name: $BUILD_ENVIRONMENT_REGISTRY/markdown-link-check:$BUILD_ENVIRONMENT_TAG
    entrypoint: ["/bin/sh","-c"]
  variables:
    GIT_STRATEGY: fetch
  rules:
    - if: $CFS_PIPELINE_TYPE == "test"
      allow_failure: true # do not prevent merge
    - if: $CFS_PIPELINE_TYPE == "manual"
      when: manual
      allow_failure: true # do not prevent merge
  script:
    - markdown-link-check README.md
    - markdown-link-check CONTRIBUTING.md
    # check all in source, share/doc/developer/build-dependencies and .gitlab
    - find source -name '*.md' -print0 | xargs -0 -n1 markdown-link-check --config .gitlab/ci/markdown-link-check-config.json
    - find share/doc/developer/build-dependencies -name '*.md' -print0 | xargs -0 -n1 markdown-link-check --config .gitlab/ci/markdown-link-check-config.json
    - find .gitlab -name '*.md' -print0 | xargs -0 -n1 markdown-link-check --config .gitlab/ci/markdown-link-check-config.json

# this job is intended as a warning if the pipeline has changed
# it is running only if there are changes, and will always fail if there are some
pipeline-changes:
  extends: .check #extension can be found in hidden_jobs.yml
  image:
    name: alpine/git:2.47.1
    entrypoint: ["/bin/sh","-c"]
  rules:
    # only run the job for merge requests if there are changes in the pipeline definition
    - if: $CFS_PIPELINE_TYPE == "test"
      <<: *pipeline_changes
      allow_failure: true # only for info, do not prevent merge
    - if: $CFS_PIPELINE_TYPE == "manual"
      <<: *pipeline_changes
      when: manual
      allow_failure: true # only for info, do not prevent merge
  before_script:
    - echo $CI_MERGE_REQUEST_TARGET_BRANCH_NAME 
    - git diff remotes/origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME -- .gitlab-ci.yml || git diff HEAD~1 -- .gitlab-ci.yml
  script:
    - /the/pipeline/has/changed

runner-debug:
  extends: .check #extension can be found in hidden_jobs.yml
  image: alpine
  tags:
    - saas-linux-small-amd64
  rules:
    - if: $CFS_PIPELINE_TYPE == "manual" || $CFS_PIPELINE_TYPE == "test"
      when: manual
      allow_failure: true # only for info, do not prevent merge
  script:
    - echo "$CFS_PIPELINE_NAME"
    - echo "$CFS_PIPELINE_TYPE"
    - echo "$CACHE_POLICY:$INSTALL_POLICY"
    - echo $TESTSUITE_BRANCH
    - echo $CFS_UPSTREAM_REF
    - echo $CI_SERVER_HOST
    - echo $CI_SERVER
    - echo $GITLAB_USER_ID
    - echo $GITLAB_USER_LOGIN
    - echo $CI_RUNNER_ID
    - echo $CI_RUNNER_SHORT_TOKEN
    - echo $CI_PROJECT_NAMESPACE
    - echo $CI_PROJECT_DIR
    - echo $CI_PIPELINE_URL
    - echo $CI_PAGES_URL
    - echo $CI_MERGE_REQUEST_IID
    - echo $CI_JOB_URL
    - echo $CI_COMMIT_BRANCH
    - echo $CI_COMMIT_REF_NAME
    - echo $CI_PIPELINE_SOURCE
    - echo $CI_PIPELINE_IID
    - echo $CI_JOB_IMAGE
    - echo $CI_JOB_NAME_SLUG
    - echo $CI_MERGE_REQUEST_LABELS

# this job is created when there is a skip-build in the commit message
skip-build:
  extends: .check #extension can be found in hidden_jobs.yml
  image: alpine
  tags:
    - saas-linux-small-amd64
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /skip-build/ && $CFS_PIPELINE_TYPE == "test"
      allow_failure: true # only for info, do not prevent merge
    - if: $CI_COMMIT_MESSAGE =~ /skip-build/ && $CFS_PIPELINE_TYPE == "manual"
      when: manual
      allow_failure: true # only for info, do not prevent merge
  script:
    - /commit/message/contained/skip-build

cpp-code-changes:
  extends: .check #extension can be found in hidden_jobs.yml
  image: alpine
  tags:
    - saas-linux-small-amd64
  rules:
    - if: $CFS_PIPELINE_TYPE == "test"
      <<: *require-rebuild-changes
      allow_failure: true # only for info, do not prevent merge
    - if: $CFS_PIPELINE_TYPE == "manual"
      <<: *require-rebuild-changes
      when: manual
      allow_failure: true # only for info, do not prevent merge
  script:
    - /merge/request/ and /the/code/has/changed

#######################################################################
# PLATFORM STAGE
#######################################################################
# here we test the build dependency installation instructions (from share/doc/developer/build-dependencies)
# and the build instructions (from README.md)
# all jobs in the stage have no needs, and are manual (one can start them by the play-button)


# add all platforms we can build on.
# the IMAGE variable should be set according to the 'image' (docker runner option) and requires
# a correctly named instruction in share/doc/developer/build-dependencies

# fedora releases, see https://hub.docker.com/_/fedora
# latest stable release
fedora:latest:
  extends: .platform #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: "fedora"
    TAG: "latest"
  image: # workaround due to 'shell not found'-bug: https://gitlab.com/gitlab-org/gitlab-runner/-/issues/27614
    entrypoint: [ '/bin/sh', '-c' ]

# latest development release
fedora:rawhide:
  extends: .platform #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: "fedora"
    TAG: "rawhide"
  image: # workaround due to 'shell not found'-bug: https://gitlab.com/gitlab-org/gitlab-runner/-/issues/27614
    entrypoint: [ '/bin/sh', '-c' ]

# ubuntu releases, see https://hub.docker.com/_/ubuntu
# latest LTS release 
ubuntu:latest:
  extends: .platform #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: "ubuntu"
    TAG: "latest"

# the latest stable release, regardless of LTS status
ubuntu:rolling:
  extends: .platform #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: "ubuntu"
    TAG: "rolling"
  image: # workaround due to bug: https://gitlab.com/gitlab-org/gitlab-runner/-/issues/27614
    entrypoint: [ '/bin/bash', '-c', 'ln -snf /bin/bash /bin/sh && /bin/bash -c $0' ] 

# older LTS releases ...
ubuntu:20.04:
  extends: .platform #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: "ubuntu"
    TAG: "20.04"

# debian releases, see https://hub.docker.com/_/debian
# latest stable release (dynamic image name)
debian:latest:
  extends: .platform #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: "debian"
    TAG: "latest"

# older releases ... https://www.debian.org/releases/
debian:11: # (bullseye)
  extends: .platform #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: "debian"
    TAG: "11"

# RHEL derivatives
# rockylinux 8, see https://hub.docker.com/_/rockylinux
rhel:8:
  extends: .platform #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: "rockylinux"
    TAG: "8"

# rockylinux 9, see https://hub.docker.com/_/rockylinux
rhel:9:
  extends: .platform #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: "rockylinux"
    TAG: "9"

#######################################################################
# cfsdeps stage
#######################################################################
# here we build the cfsdeps and store them and
# store the precompiled ones as artifacts
# we need to precompile for all GCC versions independently

cfsdeps:gcc9:
  extends: .cfsdeps #extension can be found in hidden_jobs.yml
  variables:
    <<: *cfsdeps-variables
    IMAGE: centos7-gcc9

# intel assumes that CC,CXX,FC are set (e.g. in bash_profile of the Dockerfile)
cfsdeps:intel:
  extends: .cfsdeps #extension can be found in hidden_jobs.yml
  variables:
    <<: *cfsdeps-variables
    IMAGE: rhel8-intel

cfsdeps:clang:
  extends: .cfsdeps #extension can be found in hidden_jobs.yml
  variables:
    <<: *cfsdeps-variables
    IMAGE: rhel8-llvm

cfsdeps:gcc14-musl:
  extends: .cfsdeps #extension can be found in hidden_jobs.yml
  variables:
    <<: *cfsdeps-variables
    CFS_CONFIG_OPTIONS: $MUSL_CONFIG_OPTIONS # add the MUSL-options
    IMAGE: alpine

cfsdeps:msvc2022:
  extends: .windows-shared-build #extension can be found in hidden_jobs.yml
  stage: cfsdeps
  rules:
    - !reference [.cfsdeps,rules] #extension can be found in hidden_jobs.yml
  variables:
    # we build with ninja and each cfsdeps is build in parallel, so build the deps themselves serially
    # build them in defined order such that already completed ones will be in the cache on a restart
    # the list is more or less arbitrary, the last "cfsdeps" should make sure we have everything from the default config
    BUILD_COMMAND: "cmake --build . --target boost --parallel 1 &&
                    cmake --build . --target hdf5 --parallel 1 &&
                    cmake --build . --target arpack --parallel 1 &&
                    cmake --build . --target metis --parallel 1 &&
                    cmake --build . --target ipopt --parallel 1 &&
                    cmake --build . --target feast --parallel 1 &&
                    cmake --build . --target lis --parallel 1 &&
                    cmake --build . --target flann --parallel 1 &&
                    cmake --build . --target muparser --parallel 1 &&
                    cmake --build . --target vtk --parallel 1 &&
                    cmake --build . --target ginkgo --parallel 1 &&
                    cmake --build . --target cfsdeps --parallel 1"
    RUNNER_SCRIPT_TIMEOUT: 100m # set a script timeout lower than the job timeout (seems 120m in hosted windows runners) to ensure there is time for artifact and cache upload
  after_script:
    # just debug
    - !reference [.powershell_debug_dir_listing, script]
  artifacts:
    when: on_success
    paths:
      - build/cfsdeps/cache/precompiled/*.zip
    name: "${CI_JOB_NAME_SLUG}__${CI_COMMIT_REF_SLUG}"
    expire_in: 12 hours
  # set a timeout for the job (increasing the project-level setting) https://docs.gitlab.com/ci/yaml/#timeout
  # it must not exceed the runner timeout (seems to be 2h for GitLab hosted windows runners)
  timeout: 120m
  # define retry on timeout. A retry should make use of a cache from the previous job
  retry:
    max: 2
    when:
      - stuck_or_timeout_failure
      - job_execution_timeout
  # Set optional needs for optional jobs needed in the clear-cache case: install job and parallel builds of large cfsdeps
  needs:
    - job: install:msvc2022
      optional: true
    - job: largedeps:msvc2022
      optional: true


#######################################################################
# BUILD STAGE
#######################################################################

# maximal build using as many options as possible
linux:gcc9max-debug:
  extends: .default_build_job #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: centos7-gcc9
    CFS_CONFIG_OPTIONS: "-DDEBUG=ON -DUSE_OPENMP=OFF $MAX_CONFIG_OPTIONS"
    # use ccache
    CMAKE_CXX_COMPILER_LAUNCHER: ccache
  <<: [ *max_rules, *gcc_before ] #extension can be found in hidden_jobs.yml
  needs: 
    - job: cfsdeps:gcc9
      optional: true

# maximal build using as many options as possible
linux:gcc9max:
  extends: .default_build_job #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: centos7-gcc9
    CFS_CONFIG_OPTIONS: $MAX_CONFIG_OPTIONS
    # use ccache
    CMAKE_CXX_COMPILER_LAUNCHER: ccache
  <<: [ *max_rules, *gcc_before ] #extension can be found in hidden_jobs.yml
  needs: 
    - job: cfsdeps:gcc9
      optional: true

linux:gcc9:
  extends: .default_build_job #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: centos7-gcc9
    # use ccache
    CMAKE_CXX_COMPILER_LAUNCHER: ccache    
  <<: [ *build_rules, *gcc_before ] #extension can be found in hidden_jobs.yml
  needs: 
    - job: cfsdeps:gcc9
      optional: true

# this is the official release build
linux:gcc14-musl:
  extends: .default_build_job #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: alpine
    CFS_CONFIG_OPTIONS: "-DBUILD_TESTING_PERFORMANCE=ON $MUSL_CONFIG_OPTIONS"
    # use ccache
    CMAKE_CXX_COMPILER_LAUNCHER: ccache
    # use Ninja to test if we have dependencies declared properly, standard would be "Unix Makefiles"
    CMAKE_GENERATOR: Ninja
  <<: [ *release_build_rules, *gcc_before ] #extension can be found in hidden_jobs.yml
  needs: 
    - job: cfsdeps:gcc14-musl
      optional: true

linux:gcc9min:
  extends: .default_build_job #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: centos7-gcc9
    CFS_CONFIG_OPTIONS: "-DBUILD_CFSDAT=OFF -DUSE_BLAS_LAPACK=NETLIB -DBUILD_UNIT_TESTS=OFF -DUSE_ARPACK=OFF -DUSE_GINKGO=OFF -DUSE_CGAL=OFF -DUSE_CGNS=OFF -DUSE_DUMAS=OFF -DUSE_ENSIGHT=OFF -DUSE_EXPRESSION_TEMPLATES=OFF -DUSE_FEAST=OFF -DUSE_FLANN=OFF -DUSE_GIDPOST=OFF -DUSE_IPOPT=OFF -DUSE_LIS=OFF -DUSE_METIS=OFF -DUSE_OPENMP=OFF -DUSE_PARDISO=OFF -DUSE_SUITESPARSE=OFF -DUSE_SUPERLU=OFF "
    # use ccache
    CMAKE_CXX_COMPILER_LAUNCHER: ccache
  <<: [ *build_rules, *gcc_before ] #extension can be found in hidden_jobs.yml
  needs:
    - job: cfsdeps:gcc9
      optional: true

# closed build using as many options as possible and containing closed source software AND tests
linux:gcc9closed:
  extends: .default_build_job #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: centos7-gcc9
    # embedded_python is not closed but technically not that easy deployable
    CFS_CONFIG_OPTIONS: "-DUSE_SCPIP=ON -DUSE_SNOPT=ON -DUSE_EMBEDDED_PYTHON=ON -DUSE_SUITESPARSE=ON -DBUILD_CFSDAT=OFF" 
    # use ccache
    CMAKE_CXX_COMPILER_LAUNCHER: ccache
  # ensure closed build is tested only when the keys are set
  rules:
    - if: $CFS_KEY_SCPIP == null || $CFS_KEY_SNOPT == null # check if one key is not defined (null) which is equivalent to checking if both are defined - we only build if both keys are defined
      when: never
    - !reference [.build_rules, rules] #extension can be found in hidden_jobs.yml
  <<: [*gcc_before]
  # make sure artifacts are not accessible, see https://docs.gitlab.com/ee/ci/yaml/#artifactsaccess
  artifacts:
    access: 'none'
  needs:
    - job: cfsdeps:gcc9
      optional: true  

# intel compiler builds
linux:intel:
  extends: .default_build_job #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: rhel8-intel
    # use ccache
    CMAKE_CXX_COMPILER_LAUNCHER: ccache
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /skip-builds-intel/'
      <<: *require-rebuild-changes
      when: manual
    - if: '$CI_COMMIT_MESSAGE =~ /skip-builds-intel/'
      when: manual
    - !reference [.build_rules, rules] #extension can be found in hidden_jobs.yml
  <<: [ *intel_before ]
  needs:
    - job: cfsdeps:intel
      optional: true

# LLVM clang compiler builds
linux:clang-debug:
  extends: .default_build_job #extension can be found in hidden_jobs.yml
  variables:
    IMAGE: rhel8-llvm
    CFS_CONFIG_OPTIONS: "-DDEBUG=ON "
    # use ccache
    CMAKE_CXX_COMPILER_LAUNCHER: ccache
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /skip-builds-clang/'
      when: manual
      allow_failure: true
    - !reference [.build_rules, rules] #extension can be found in hidden_jobs.yml
  before_script:
    # ensure clang is installed
    - clang --version
    # general build before script
    - !reference [.before-script-build, script] #extension can be found in hidden_jobs.yml
  cache:
    - key: cfsdeps-precompiled-Clang-${CI_COMMIT_REF_NAME}
      paths:
        - build/cfsdeps/cache/precompiled
      fallback_keys:
        - cfsdeps-precompiled-Clang-$CI_DEFAULT_BRANCH
    - key: cfsdeps-sources-$CI_COMMIT_REF_NAME
      paths:
        - build/cfsdeps/cache/sources/
      fallback_keys:
        - cfsdeps-sources-$CI_DEFAULT_BRANCH
  needs:
    - job: cfsdeps:clang
      optional: true

# windows build
windows:msvc2022:
  extends: .windows-shared-build #extension can be found in hidden_jobs.yml
  stage: build
  <<: *release_build_rules #extension can be found in hidden_jobs.yml
  variables:
    # see https://yaml-multiline.info/ for multiline info
    # building cfs with ninja we need to make sure to build cfsdeps serially first (practically all from precompiled cfsdeps)
    BUILD_COMMAND: "ctest -D ExperimentalStart --track $CDASH_TRACK -V &&
                    ctest -D ExperimentalUpdate --track $CDASH_TRACK -V &&
                    ctest -D ExperimentalConfigure --track $CDASH_TRACK -V &&
                    ctest -D ExperimentalSubmit --track $CDASH_TRACK &&
                    cmake --build . --target cfsdeps --parallel 1 &&
                    ctest -D ExperimentalBuild --track $CDASH_TRACK -V | tee build.log &&
                    ctest -D ExperimentalSubmit --track $CDASH_TRACK &&
                    ctest -D ExperimentalTest --track $CDASH_TRACK -R Pipeline_Build -V"
    # use ccache
    CMAKE_CXX_COMPILER_LAUNCHER: ccache.exe
  script:
    # inherit the standard script, then extend by mv command
    - !reference [.windows-shared-build, script]
    # rename packaged file to branch-based name - ignore a possible -modified variant
    - mv "CFS-$CI_COMMIT_SHA*-win64.zip" "CFS-$CI_COMMIT_REF_SLUG-Windows.zip"
  artifacts:
    when: always
    paths:
      - build/CFS-*-Windows.zip
      - build/logs.zip
    expire_in: 1 days
  needs:
    # set the needs to 'optional' since the cfsdeps job might not be present
    - job: cfsdeps:msvc2022
      optional: true
    - job: install:msvc2020
      optional: true


#######################################################################
# TEST STAGE
#######################################################################
# the test stage might run on a different runner than the build, thus
# the binaries are shared via the gitlab server (artifacts/dependencies)
#
# We have the following different test configurations
# * stable - runs the Testsuite on a single thread and disabling some unstable tests via -LE unstable (and python tests)
# * testsuite - runs the Testsuite on all available cores (disabling python tests) with two threads (multicore_all)
# * no-slow - run debug builds and skip unstable and slow (bow by label) and no python tests
#             the tool tests.py in the Testsuite can be used for setting and checking the slow label for the tests.
# * python - runs the Python-Tests of the testsuite, independent of the c++ build
# Both _stable_ and _testsuite_ are run for all build configs (GCCx),
# _python_ is seperate as not to re-run python tests for all GCCx versions.


# now we define the actual tests, i.e. we decide which build we want to test
# the build is taken from the dependencies
# Naming scheme for CI_JOB_NAME: <test-set_parallelism>:<build-name>:<system>
# The BUILDNAME (for DCash will be inferred from CI_JOB_NAME in CMakeLists of the Testsuite)
stable_ser:gcc9min:linux:
  tags:
    - saas-linux-small-amd64
  stage: test
  variables:
    IMAGE: ubuntu22.04
    TEST_CONFIG_OPTIONS: -DTESTSUITE_THREADS=1
    CTEST_OPTIONS: "-LE unstable|broken"
  <<: *test_generic #extension can be found in hidden_jobs.yml
  needs:
    - linux:gcc9min

