# This file is used to define the CI pipeline for GitLab
variables:
  GIT_SUBMODULE_STRATEGY: recursive

stages:
  - update
  - configure
  - build
  - test
  - submit

# this is run before every step
before_script:
  - mkdir -p build # make build dir
  - cd build

# cache the build files see https://docs.gitlab.com/ee/ci/caching/index.html
# use the ref-name, e.g. `master` as key -> same for sucessive builds
cache:
  key: ${CI_COMMIT_REF_NAME}
  paths:
    - build

start:
  stage: start
  script:
    - ctest -D ContinuousStart
    - ctest -D ContinuousUpdate

# only include a config step for the start
configure:
  stage: configure
  script:
    - rm -f CMakeCache.txt # clear any old chache
    - ctest -D ContinuousConfigure -V
  # provides artifacts in gitlab (can be downloaded)
  artifacts:
    paths:
      - build/CMakeCache.txt
    expire_in: 1 week

build:
  stage: build
  script:
    - ctest -D ContinuousBuild -V
  dependencies:
    - configure

test:
  stage: test
  script:
    - ctest -D ContinuousTest
  dependencies:
    - build

start:
  stage: submit
  script:
    - ctest -D ContinuousSubmit
  when: always
