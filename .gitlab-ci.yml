# This file is used to define the CI pipeline for GitLab
# https://docs.gitlab.com/ee/ci/yaml
#
# Syntax tipps:
# * check on https://cfs-dev.mdmt.tuwien.ac.at/ci/lint
# * do not use a command `echo "warming: the : is not allowed in a string"`

# https://docs.gitlab.com/ee/ci/variables/#variables-expressions
variables:
  GIT_STRATEGY: fetch # this is faster than clone and should re-use a workspace
  GIT_SUBMODULE_STRATEGY: recursive
  CDASH_TRACK: Gitlab # will be overwritten by nichtly schedule

# stages in the pipeline run in succession
stages:
  - check
  - build # config and build combined
  - test # we may have several test configs for one build
  - deploy

# determines when the pipeline runs
.default_pipeline_rules: &default_pipeline_rules
  only:
    refs:
      - master # for the master branch
      - /^test.*$/ # for branches/tags called "test*"
      - /^.*-test$/ # for branches/tags called "*-test"
      - web # For pipelines created using 'Run pipeline' button in GitLab UI under project/Pipelines
      - schedules # For scheduled pipelines

# this is run after every step
after_script:
  - cd build
  - ctest --quiet -O submit.log -D ExperimentalSubmit --track $CDASH_TRACK || cat submit.log # only output submit.log on fail

# cache the build files see https://docs.gitlab.com/ee/ci/caching/index.html
# use the ref-name, e.g. `master` as key -> same for sucessive builds
# it is stored as a zip archive and extracted before each stage - this takes time,
# thus we combine the build and configure step
# the key is used to define which chache is used for which job.
cache:
  key: ${CI_COMMIT_REF_NAME}
  paths:
    - build/cfsdeps/cache
    - build/bin
    - build/lib*

#################################################
# Check STAGE
#################################################
# Check the revision of the testsuite submodule
testsuite-revision:
  stage: check
  tags:
    - git
  variables:
    # we clone to make sure we have everyting (including current names of the SHAs)
    GIT_STRATEGY: clone
  before_script:
    - git --no-pager log -1 --pretty=tformat:'%h %D'
    - echo "$CI_COMMIT_REF_NAME"
  script:
    # check in Testsuite submodule
    - cd Testsuite
    - git --no-pager log -1 --pretty=tformat:'%h %D'
    # check if we are on a branch called like the branch from CFS (or still on master)
    - git --no-pager log -1 --pretty=tformat:'%h %D' | egrep -w "(${CI_COMMIT_REF_NAME})|(master)"
  after_script:
    - pwd # debug
  cache: {} # disable
  allow_failure: true # it will fail if the most recent commit on the branch is not the HEAD of the branch
  <<: *default_pipeline_rules

# this job is intended as a warning if the piepline has changed
# it is created only if there are changes, and will always fail (but is allowed to)
pipeline-changes:
  extends: .default_pipeline_rules
  stage: check
  tags:
    - git
  before_script:
    - git diff HEAD~1 -- .gitlab-ci.yml
  script:
    - /the/pipeline/has/changed
  after_script: []
  allow_failure: true
  cache: {} # disable
  only:
    changes:
      - .gitlab-ci.yml

# this job is intended as a warning if the piepline has been skipped by commit messages
#  
pipeline-skip:
  extends: .default_pipeline_rules
  stage: check
  tags:
    - linux
  before_script:
    - echo "$CI_COMMIT_MESSAGE" > message
    - cat message
    - sed -z 's/\n/ /g' message > message-oneline
  script:
    # print files without match (-L) and check for "message", i.e. "skip-XXX" is not in commit message 
    - grep -v skip-platform-builds message-oneline
    - grep -v skip-stable-tests message-oneline
    - grep -v skip-testsuite-tests message-oneline
    - grep -v skip-gcc-builds message-oneline
    - grep -v skip-python-tests message-oneline
  after_script: []
  allow_failure: true
  cache: {} # disable 

#################################################
# BUILD STAGE
#################################################
# Here we define the build jobs, if one fails we do not need to test

.default_build_job: &default_build_job
  extends: .default_pipeline_rules
  # do not add this job if commit message contains 'skip-gcc-builds'
  except:
    variables:
      - $CI_COMMIT_MESSAGE =~ /skip-gcc-builds/
  script:
    - cat pre_cmd || touch pre_cmd # be sure pre_cmd exists (it may contain scl-enable)
    # we use the devtoolset for any second-level configure things to have the correct environment
    - ctest -D ExperimentalStart --track $CDASH_TRACK -V
    - ctest -D ExperimentalUpdate --track $CDASH_TRACK -V
    - sh -c "$(cat pre_cmd) ctest -D ExperimentalConfigure --track $CDASH_TRACK -V"
    - ctest --quiet -O submit.log -D ExperimentalSubmit --track $CDASH_TRACK || cat submit.log # intermittent submit to get live CDash results
    - sh -c "$(cat pre_cmd) ctest -D ExperimentalBuild --track $CDASH_TRACK -V | tee build.out"
    - ctest --quiet -O submit.log -D ExperimentalSubmit --track $CDASH_TRACK  || cat submit.log
    - ctest -D ExperimentalTest -R Install --track $CDASH_TRACK # only do the install testing
    # check the coding_score
    - ../ctest_scripts/shared/coding_score.sh build.out
  coverage: '/coding_score=(\d+[.]\d+)/'
  artifacts:
    paths: # just an example
      - build/CFS-*-Linux.tar.gz # the packed binaries for distribution
      - build/config_cmd # needed in test to apply same configure command on different runner
    expire_in: 3 days

.gcc_before: &gcc_before
  before_script:
    - mkdir -p build # create if it does not exist
    - cd build # descend in build
    - rm -f CMakeCache.txt # clear old cache
    # try software collection, and if it fails, use native gcc
    - rm -f scl_version
    # debug output
    - echo "GCC_VERSION=$GCC_VERSION"
    # check gcc version via grep
    - (scl enable devtoolset-$GCC_VERSION -- gcc --version && echo $GCC_VERSION > scl_version) | grep "${GCC_VERSION}\.[0-9]\.[0-9]" || (scl enable devtoolset-3 -- gcc --version | grep "${GCC_VERSION}\.[0-9]\.[0-9]" && echo "3" > scl_version ) || (scl enable devtoolset-4 -- gcc --version | grep "${GCC_VERSION}\.[0-9]\.[0-9]" && echo "4" > scl_version ) || (gcc --version | grep "${GCC_VERSION}\.[0-9]\.[0-9]" && touch scl_version )
    # debug output
    - cat scl_version
    # write out the config_cmd
    - echo "cmake -DBUILDNAME='$CI_COMMIT_REF_SLUG / ${BUILD_NAME}' -DCTEST_GIT_UPDATE_CUSTOM='git;checkout;$CI_COMMIT_SHA' ${CFS_CONFIG_OPTIONS} .." > config_cmd && cat config_cmd
    # write out the correct scl as pre_cmd
    - scl enable devtoolset-`cat scl_version` -- echo "scl enable devtoolset-$(cat scl_version) -- " > pre_cmd || echo "" > pre_cmd
    - sh -c "$(cat pre_cmd) $(cat config_cmd)"
    # go back one revision and then update by ctest
    - git checkout HEAD~1

build:gcc4: # eventually we should have one job for each required configuration
  stage: build
  tags:
    - gcc4
    - libc2.12 # this is the lowest libc version we can build with -> it should run on all runners
  variables:
    BUILD_NAME: "GCC4"
    GCC_VERSION: 4
  <<: *gcc_before
  <<: *default_build_job
  # allow the release build again (since it is required for deploy)
  except:
    variables: []

build:gcc5:
  stage: build
  tags:
    - gcc5
  variables:
    BUILD_NAME: "GCC5"
    GCC_VERSION: 5
  <<: *gcc_before
  <<: *default_build_job

build:gcc6:
  stage: build
  tags:
    - gcc6
  variables:
    BUILD_NAME: "GCC6"
    GCC_VERSION: 6
  <<: *gcc_before
  <<: *default_build_job

build:gcc7:
  stage: build
  tags:
    - gcc7
  variables:
    BUILD_NAME: "GCC7"
    GCC_VERSION: 7
  <<: *gcc_before
  <<: *default_build_job

build:gcc7min:
  stage: build
  tags:
    - gcc7
  variables:
    BUILD_NAME: "GCC7 minimal"
    GCC_VERSION: 7
    CFS_CONFIG_OPTIONS: "-DCFSDAT=OFF -DCFS_BLAS_LAPACK=OPENBLAS -DUSE_COMSOL=OFF -DUSE_GIDPOST=OFF -DUSE_GMV=OFF -DUSE_GMSH=OFF -DUSE_UNV=OFF -DUSE_ENSIGHT=OFF -DUSE_ANSYSRST=OFF -DUSE_PARDISO=OFF -DUSE_FEAST=OFF -DUSE_ILUPACK=OFF -DUSE_SUITESPARSE=OFF -DUSE_LIS=OFF -DUSE_SUPERLU=OFF -DUSE_CGNS=OFF -DUSE_METIS=OFF -DUSE_CGAL=OFF -DUSE_FLANN=OFF -DUSE_OPENMP=OFF -DBUILD_PALM=OFF"
  <<: *gcc_before
  <<: *default_build_job

# maximal build using as many options as possible
build:gcc7max:
  stage: build
  tags:
    - gcc7
    - license-keys
  variables:
    BUILD_NAME: "GCC7 maximal"
    GCC_VERSION: 7
    CFS_CONFIG_OPTIONS: "-DUSE_IPOPT=ON -DUSE_SCPIP=ON -DUSE_SNOPT=ON"
  <<: *gcc_before
  <<: *default_build_job

# Template for the platform builds
.platform:image:
  stage: build
  tags:
    - docker
  after_script: []
  # include the default pipeline rules
  extends: .default_pipeline_rules
  # add an additional rule:
  # we only run this 
  #  1) if the variable $PLATFORM is present, and
  #  2) the variable $IMAGE (defined in jobs) matches the pattern in $PLATFORM
  # e.g. set PLATFORM=/(centos)|(ubuntu)/ to test centos and ubuntu
  # for further details see https://docs.gitlab.com/ee/ci/variables/README.html#environment-variables-expressions
  only:
    variables:
      - $PLATFORM && $IMAGE =~ $PLATFORM
  except:
    variables:
      - $CI_COMMIT_MESSAGE =~ /skip-platform-builds/
  # disable artifacts and cache
  artifacts: {}
  cache: {}
  # switch off cloning the Testsuite submodule
  variables:
    GIT_SUBMODULE_STRATEGY: none
  # install dependecies in the docker image
  before_script:
    # debug output
    - echo "IMAGE=$IMAGE"
    - echo "IMAGE=$TAG"
    - echo "PLATFORM=$PLATFORM"
    - cat /etc/*release
    # run the setup instructions for this IMAGE
    - ./share/scripts/mdsh --eval "share/doc/developer/build-dependencies/${IMAGE}_${TAG}.md" | bash -e -x
  # run the README which contains build instructions
  script:
    - ./share/scripts/mdsh --eval 'README.md' | bash -e -x

# add all platforms we can build on. In order to actually activate them set PLATFORM accordlingly (see above)
# the IMAGE variable should be set according to the 'image' (docker runner option) and requires
# a correctly named instruction in share/doc/developer/build-dependencies
platform:fedora:
  extends: .platform:image
  image: fedora
  variables:
    IMAGE: "fedora"
    TAG: "latest"

# the latest LTS release
platform:ubuntu:
  extends: .platform:image
  image: ubuntu
  variables:
    IMAGE: "ubuntu"
    TAG: "latest"

# the latest stable release, regardless of LTS status
platform:ubuntu:rolling:
  extends: .platform:image
  image: ubuntu:rolling
  variables:
    IMAGE: "ubuntu"
    TAG: "rolling"

# older ubuntu versions
platform:ubuntu:16.04:
  extends: .platform:image
  image: ubuntu:16.04
  variables:
    IMAGE: "ubuntu"
    TAG: "16.04"

platform:ubuntu:18.04:
  extends: .platform:image
  image: ubuntu:18.04
  variables:
    IMAGE: "ubuntu"
    TAG: "18.04"

platform:debian:
  extends: .platform:image
  image: debian
  variables:
    IMAGE: "debian"
    TAG: "latest"

platform:centos:
  extends: .platform:image
  image: centos
  variables:
    IMAGE: "centos"
    TAG: "latest"
    CMAKE_CXX_FLAGS: "-lrt"

platform:centos:7:
  extends: .platform:image
  image: centos:7
  variables:
    IMAGE: "centos"
    TAG: "7"

# re-build everything
complete-build:linux:
  stage: build
  tags:
    - linux
  when: manual
  before_script:
    - rm -rf build # clear
    - mkdir build
    - cd build
    - cmake -DBUILDNAME="$CI_COMMIT_REF_SLUG / complete-build" -DCTEST_GIT_UPDATE_CUSTOM:STRING="git;checkout;$CI_COMMIT_SHA" ..
    # go back one revision and then update by ctest
    - git checkout HEAD~1
  <<: *default_build_job


#################################################
# TEST STAGE
#################################################
# the test stage might run on a different runner than the build, thus
# the binaries are shared via the gitlab server (artifacts/dependencies)

# test preparation starts by extracting the build files from assets
.ctest_default: &ctest_default
  extends: .default_pipeline_rules
  # disable if a) we have no gcc builds
  except:
    variables:
      - $CI_COMMIT_MESSAGE =~ /skip-gcc-builds/
  before_script:
    - mkdir -p build
    - cd build # descend in build
    - ls # debug
    - tar -xzvf "CFS-$CI_COMMIT_SHA-Linux.tar.gz" --strip-components=1 # extract to correct location
    - cmake -DCTEST_GIT_UPDATE_CUSTOM:STRING="git;checkout;$CI_COMMIT_SHA" .. # ensure we have a working update command
    - sh -c "$(cat config_cmd)" # configure with the used build options (to have the correct tests turned ON/OFF)
# [global setting](https://docs.gitlab.com/ee/user/project/pipelines/settings.html#test-coverage-parsing) applies to last test only
# https://docs.gitlab.com/ee/ci/yaml/#coverage
# in the format '/REGEX/' - one can test REGEX at http://rubular.com/
  coverage: '/(\d+\%)\s+tests\s+passed,\s+\d+\s+tests?\s+failed\s+out\s+of\s+\d+/'
  # no chache for testing necessary - binary comes from artifacts
  cache: {}


# this is the config that has to pass
.test_stable: &test_stable
  extends: .ctest_default
  # disable also if 'skip-stable-tests' is contained in commit message
  except:
    variables:
      - $CI_COMMIT_MESSAGE =~ /skip-gcc-builds/
      - $CI_COMMIT_MESSAGE =~ /skip-stable-tests/
  script:
    - cmake -DBUILDNAME="$CI_COMMIT_REF_SLUG / ${BUILD_NAME} / stable" -DGITLAB_TEST_TAG:STRING=`date +%Y%m%d-%H%M` -DTESTSUITE_THREADS=1 -DTESTSUITE_CFSTOOL_MODE=relL2diff .. # re-configure with most robust test config
    - ctest -D ExperimentalStart --track $CDASH_TRACK # start a new dashboard
    - git checkout HEAD~1 # back one revision and then update
    - ctest -D ExperimentalUpdate --track $CDASH_TRACK # SHA is visible in CDash
    - ctest -D ExperimentalConfigure --track $CDASH_TRACK # show config
    - ctest -D ExperimentalTest -E "Instal|ElecTherm_ElTh_NMGtransient|CFSdat_FFT_2D|curlcurlA3d|max_ortho_robust|max_e11_iso|Optimization_Dynamic_eigenfrequency|nrfcommon|1dOscillatorQEVP|DampedBeam2D" --track $CDASH_TRACK # exclude the install step and the failing tests

# test everything
.test_all_multicore: &test_all_multicore
  extends: .ctest_default
  # disable also if 'skip-testsuite-tests' is contained in commit message
  except:
    variables:
      - $CI_COMMIT_MESSAGE =~ /skip-gcc-builds/
      - $CI_COMMIT_MESSAGE =~ /skip-testsuite-tests/
  script:
    - cmake -DBUILDNAME="$CI_COMMIT_REF_SLUG / ${BUILD_NAME} / all_multicore" -DGITLAB_TEST_TAG:STRING=`date +%Y%m%d-%H%M` -DTESTSUITE_CFSTOOL_MODE=relL2diff .. # multicore
    - ctest -D ExperimentalStart --track $CDASH_TRACK # start a new dashboard
    - git checkout HEAD~1 # back one revision and then update
    - ctest -D ExperimentalUpdate --track $CDASH_TRACK # SHA is visible in CDash
    - ctest -D ExperimentalConfigure --track $CDASH_TRACK # show config
    - ctest -D ExperimentalTest -E Install --track $CDASH_TRACK # exclude the install step

# now we define the actual tests, i.e. we decide which build we want to test
# the build is taken from the dependecies
stable:gcc4:linux:
  tags:
    - linux
  stage: test
  variables:
    BUILD_NAME: GCC4
  retry: 1
  <<: *test_stable
  dependencies:
    - build:gcc4

# pre-pend the jobs with x as they are sorted alphabetically
testsuite:gcc4:linux: # if the machine has multiple
  tags:
    - linux
  stage: test
  variables:
    BUILD_NAME: GCC4
  <<: *test_all_multicore
  allow_failure: true # we know some tests will fail on multi-core runs, so this will not stop the pipeline
  dependencies:
    - build:gcc4

testsuite:gcc5:linux:
  tags:
    - linux
    - run_libc2.17
  stage: test
  variables:
    BUILD_NAME: GCC5
  <<: *test_all_multicore
  allow_failure: true
  dependencies:
    - build:gcc5

testsuite:gcc6:linux: # if the machine has multiple
  tags:
    - linux
    - run_libc2.17
  stage: test
  variables:
    BUILD_NAME: GCC6
  <<: *test_all_multicore
  allow_failure: true # we know some tests will fail on multi-core runs, so this will not stop the pipeline
  dependencies:
    - build:gcc6

testsuite:gcc7:linux: # if the machine has multiple
  tags:
    - linux
    - gcc7 # due to libgfortran.so.4
    - run_libc2.17
  stage: test
  variables:
    BUILD_NAME: GCC7
  <<: *test_all_multicore
  allow_failure: true # we know some tests will fail on multi-core runs, so this will not stop the pipeline
  dependencies:
    - build:gcc7

stable:gcc7min:linux:
  tags:
    - linux
    - gcc7 # due to libgfortran.so.4
    - run_libc2.17
  stage: test
  variables:
    BUILD_NAME: "GCC7 minimal"
  retry: 1
  <<: *test_stable
  dependencies:
    - build:gcc7min

testsuite:gcc7min:linux:
  tags:
    - linux
    - gcc7 # due to libgfortran.so.4
    - run_libc2.17
  stage: test
  variables:
    BUILD_NAME: "GCC7 minimal"
  <<: *test_all_multicore
  allow_failure: true # we know some tests will fail on multi-core runs, so this will not stop the pipeline
  dependencies:
    - build:gcc7min

stable:gcc7max:linux:
  tags:
    - linux
    - gcc7 # due to libgfortran.so.4
    - run_libc2.17
  stage: test
  variables:
    BUILD_NAME: "GCC7 maximal"
  retry: 1
  <<: *test_stable
  dependencies:
    - build:gcc7max

testsuite:gcc7max:linux:
  tags:
    - linux
    - gcc7 # due to libgfortran.so.4
    - run_libc2.17
  stage: test
  variables:
    BUILD_NAME: "GCC7 maximal"
  <<: *test_all_multicore
  allow_failure: true # we know some tests will fail on multi-core runs, so this will not stop the pipeline
  dependencies:
    - build:gcc7max


python:stable:
  extends: .ctest_default
  # disable if 'skip-python-tests' is found in commit message
  except:
    variables:
      - $CI_COMMIT_MESSAGE =~ /skip-python-tests/
  tags:
    - python
  stage: test
  variables:
    TEST_NAME: "stable"
    EXCLUDE: "nrfcommon"
  before_script:
    - mkdir -p build
    - cd build
    - cmake -DBUILDNAME="$CI_COMMIT_REF_SLUG / python / $TEST_NAME"  -DCTEST_GIT_UPDATE_CUSTOM:STRING="git;checkout;$CI_COMMIT_SHA" -DGITLAB_TEST_TAG:STRING=`date +%Y%m%d-%H%M` -DPYTHON_TESTS=ON ..
  script:
    - ctest -D ExperimentalStart --track $CDASH_TRACK # start a new dashboard
    - git checkout HEAD~1 # back one revision and then update
    - ctest -D ExperimentalUpdate --track $CDASH_TRACK # SHA is visible in CDash
    - ctest -D ExperimentalConfigure --track $CDASH_TRACK # show config
    - ctest -D ExperimentalTest -R PYTHON -E "$EXCLUDE" --track $CDASH_TRACK # only test python

python:all:
  extends: python:stable
  variables:
    TEST_NAME: "all"
    EXCLUDE: ""
  allow_failure: true

#################################################
# DEPLOY STAGES
#################################################

.deploy_rules: &deploy_rules
  only:
    refs:
      - master # only for refs pushed to master
    variables:
      # use variables to limit deply jobs for mdmt to pipelines from the corresponding namespace
      # see the default variales https://docs.gitlab.com/ee/ci/variables/#predefined-variables-environment-variables
      - $CI_PROJECT_NAMESPACE == "cfs"
  tags:
    - linux
    - mdmt
  stage: deploy
  cache: {}
  after_script: []
  before_script: []
  
copy_to_draco:
  dependencies:
    - build:gcc4
  script:
    # copy over via scp
    - scp "build/CFS-$CI_COMMIT_SHA-Linux.tar.gz" "draco:/opt/programs/cfs_master/CFS-$CI_COMMIT_SHA-Linux.tar.gz"
  environment:
    name: share_programs
  <<: *deploy_rules

install_on_draco:
  dependencies: []
  script:
    # wait for the copy to finish, timeout after 120s, if timeout try to list file
    - ssh draco "inotifywait -t180 -e close_write /opt/programs/cfs_master" || ssh draco "ls /opt/programs/cfs_master/CFS-$CI_COMMIT_SHA-Linux.tar.gz"
    # extract on draco by ssh
    - ssh draco "tar -xzf /opt/programs/cfs_master/CFS-$CI_COMMIT_SHA-Linux.tar.gz -C /opt/programs/cfs_master"
    # set the new symlink and replace the old one in one atomic operation
    - ssh draco "cd /opt/programs/cfs_master/; ln -s CFS-$CI_COMMIT_SHA-Linux new; mv -fT new latest"
    # run the cleanup script
    - ssh draco "cd /opt/programs/cfs_master/; ./cleanup.sh"
  environment:
    name: share_programs
  <<: *deploy_rules

# this creates the XML-schema (without optimization) and copies it to cfs-doc/xml/<branch>/
xml_to_cfs-doc:
  extends: .deploy_rules  
  dependencies: []
  before_script:
    - mkdir -p build
    - mkdir -p public
    - cd build
    - cmake -DDISABLE_OPTIMIZATION=ON -DBUILD_TESTING=OFF ..
    - cd share/xml
    - make
  script:
    - mkdir -p $CI_COMMIT_REF_NAME
    - mv CFS-* $CI_COMMIT_REF_NAME
    - scp -r $CI_COMMIT_REF_NAME cfs-doc:/var/www/xml/.
  environment:
    name: cfs-dev_xml/$CI_COMMIT_REF_NAME
    url: https://cfs-doc.mdmt.tuwien.ac.at/xml/$CI_COMMIT_REF_NAME/CFS-Simulation/CFS.xsd

xml_to_cfs-doc_tag:
  extends: xml_to_cfs-doc
  only:
    refs:
      - tags # only if pipeline is triggerd for a tag
  script:
    - mkdir -p $CI_COMMIT_TAG
    - mv CFS-* $CI_COMMIT_TAG   
    - scp -r $CI_COMMIT_TAG cfs-doc:/var/www/xml/.
  environment:
    name: cfs-dev_xml/$CI_COMMIT_TAG
    url: https://cfs-doc.mdmt.tuwien.ac.at/xml/$CI_COMMIT_TAG/CFS-Simulation/CFS.xsd
