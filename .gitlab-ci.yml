# This file is a template, and might need editing before it works on your project.
# use the official gcc image, based on debian
# can use verions as well, like gcc:5.2
# see https://hub.docker.com/_/gcc/
stages:
  - configure
  - build

# cache the build files see https://docs.gitlab.com/ee/ci/caching/index.html
# use the ref-name, e.g. `master` as key -> same for sucessive builds
cache:
  key: ${CI_COMMIT_REF_NAME}
  paths:
    - build

# only include a config step for the start
configure:
  stage: configure
  script:
    - pwd # show where we are
    - ls # list source
    - mkdir -p build # make build dir
    - cd build
    - rm -f CMakeCache.txt # clear any old chache
    - cmake ..
    - cmake .
  # provides artifacts in gitlab (can be downloaded)
  artifacts:
    paths:
      - build/CMakeCache.txt
    expire_in: 1 week

build:
  stage: build
  script:
    - cd build
    - make
  dependencies:
    - configure
