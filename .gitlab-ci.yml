  tags:
    - saas-linux-small-amd64
  stage: test
  variables:
    IMAGE: ubuntu22.04
    BUILD_NAME: Intel2025 / stable parallel
    TEST_CONFIG_OPTIONS: -DTESTSUITE_THREADS=2
    CTEST_OPTIONS: "-LE unstable|broken"
  <<: *test_generic
  needs:
    - linux:intel

unstable_ser:intel:linux:
  tags:
    - saas-linux-small-amd64
  stage: test
  variables:
    IMAGE: ubuntu22.04
    BUILD_NAME: Intel2025 / unstable serial
    TEST_CONFIG_OPTIONS: -DTESTSUITE_THREADS=1
    CTEST_OPTIONS: "-L unstable"
  <<: *test_generic
  needs:
    - linux:intel

# windows tests
stable_ser:MSVC2022-Ifort2021:windows:
  extends: .windows-shared-test
  stage: test
  variables:
    BUILD_NAME: MSVC2022-Ifort2021 / stable serial
    TEST_CONFIG_OPTIONS: -DTESTSUITE_THREADS=1
  script: 
    - !reference [.windows-test_stable, script]
  needs:
    - windows:MSVC2022-Ifort2021

stable_par:MSVC2022-Ifort2021:windows:
  extends: .windows-shared-test
  stage: test
  variables:
    BUILD_NAME: MSVC2022-Ifort2021 / stable parallel
    TEST_CONFIG_OPTIONS: -DTESTSUITE_THREADS=2
  script: 
    - !reference [.windows-test_stable, script]
  rules:
    #make it optional since MSVC builds currently are not running in parallel
    - if: $CFS_PIPELINE_TYPE == "test" || $CFS_PIPELINE_TYPE == "manual"
      <<: *require-rebuild-changes
      when: manual
      allow_failure: true
    - !reference [.ctest_default, rules]
  needs:
    - windows:MSVC2022-Ifort2021

unstable_ser:MSVC2022-Ifort2021:windows:
  extends: .windows-shared-test
  stage: test
  variables:
    BUILD_NAME: MSVC2022-Ifort2021 / unstable serial
    TEST_CONFIG_OPTIONS: -DTESTSUITE_THREADS=1
  script:
    - !reference [.windows-test_unstable, script]
  needs:
    - windows:MSVC2022-Ifort2021

python:linux:
  image: $BUILD_ENVIRONMENT_REGISTRY/ubuntu22.04:$BUILD_ENVIRONMENT_TAG
  extends: .ctest_default
  tags:
    - saas-linux-small-amd64
  stage: test
  rules:
    # activate in schedule
    - if: $CFS_PIPELINE_TYPE == "nightly"
    # run when we have changes in python files
    - if: $CFS_PIPELINE_TYPE == "test"
      changes:
        - "**/*.py"
    - if: $CFS_PIPELINE_TYPE == "manual"
      changes:
        - "**/*.py"
      when: manual
  variables:
    TEST_NAME: "stable"
    EXCLUDE: ""
  before_script:
    - git rev-list -n 1 HEAD -- || echo "git failed, should return ${CI_COMMIT_SHA}" # debug for command run by CTestUpdate
    - mkdir -p build
    - cd build
    - !reference [.cmake_test_or_install,script] # optionally install cmake if not present
    - cmake -DBUILDNAME="$CI_COMMIT_REF_SLUG / python / $TEST_NAME" -DCTEST_UPDATE_VERSION_ONLY:BOOL=ON -DBUILD_TESTING=ON -DTESTSUITE_DIR=$(pwd)/../Testsuite -DTESTSUITE_PYTHON=ON ..
  script:
    - ctest -D ExperimentalStart --track $CDASH_TRACK # start a new dashboard
    - ctest -D ExperimentalUpdate --track $CDASH_TRACK # SHA is visible in CDash
    - ctest -D ExperimentalConfigure --track $CDASH_TRACK # show config
    - ctest -D ExperimentalTest -R PYTHON -E "$EXCLUDE" --track $CDASH_TRACK --output-junit ${CI_JOB_ID}.xml
  dependencies: [] # python tests do not need any dependencies (no cfs required)
  <<: *after_cdash_submit
  needs: [] # run as soon as possible


#######################################################################
# TEST_EXTRA STAGE - similar to before, but here we collect everything that is currently not working as intended (everything that is allowed to fail)
#######################################################################

# the extra stage is irrelevant for the merge request (alloed to fail)
# therefore we set it to manual by default
# it should auto-run for nightly tests
.test_extra:
  <<: *test_generic
  stage: test_extra
  # then overwrite rules
  rules:
    # Scheduled pipelines run all tests
    - if: $CFS_PIPELINE_TYPE == "nightly"
      allow_failure: true
    # Set the tests to manual for test-pipelines
    - if: $CFS_PIPELINE_TYPE == "test" || $CFS_PIPELINE_TYPE == "manual"
      when: manual
      allow_failure: true

