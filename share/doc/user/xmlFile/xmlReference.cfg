% ===========================================================================
% Configuration file for tex4ht used for the CFS++ documentation
% xmlReference.tex
% ===========================================================================

% create html output
\Preamble{html,frames,3}

% important: deactivate pdf output, otherwise no dvi is created which is needed 
% for successive tex4ht run
\let\pdfoutput\undefined

% begin normal document
\begin{document} 

% Adjust Navigation tab
% =====================
\Configure{crosslinks}
   {\HCode{&nbsp;}}{\HCode{&nbsp;}}{\Picture{next.png}}
   {\Picture{prev.png}}
   {}{}{}{\Picture{up.png}}
   
\Configure{crosslinks*} {prev} {up} {next} {}
\Configure{crosslinks+}{\Picture{banner.png}\HCode{<br />}}{}{\HCode{<hr><br>}}{}

% Configure table of contents
% ======================
\Css{div.tableofcontents
    {background-color: rgb(222, 222, 221);
     height: 100 \%; min-height: 100\%}
}

% Adjust normal text (no serifs)
% ==============================
\Css{body { font-family: sans-serif;}}

% Adjust link decoration
% ======================
\Css{A:link {text-decoration: none; color:blue}}
\Css{A:visited {text-decoration: none; color: blue;}}
\Css{A:active {text-decoration: none; color: black;}}
\Css{A img {border-bottom-style:none;
            border-bottom-width:0px;
            text-decoration: none;
            border:none;text-decoration: none;}}
\Css{A:hover {color: red;}}

% section for code (verbatim)
% ===========================
% Note: Currently just a workaround for missing explicit 
% xml-code command
\Css{table.verbatim {width:100\%; background-color:rgb(224,224,224);}}

% Adjust graphic section
% ================
\Configure{graphics*} 
 {png} 
  {\Link[\csname Gin@base\endcsname .png]{}{}% 
   \Picture[pict]{\csname Gin@base\endcsname .png 
    \space width="30\%" }% 
   \EndLink 
 }  
 \Configure{graphics*} 
  {jpg} 
  {\Link[\csname Gin@base\endcsname .jpg]{}{}% 
   \Picture[pict]{\csname Gin@base\endcsname .jpg 
    \space width="30\%" }% 
  \EndLink 
  }  

\EndPreamble  
