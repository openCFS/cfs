# set a global variable if the the testsuite has changes
variables:
  TESTSUITE_CHANGES: "yes"

# trigger a Testsuite pipeline multi-project pipeline, see https://docs.gitlab.com/ee/ci/pipelines/downstream_pipelines.html#multi-project-pipelines
# for this to work there needs to be a corresponding testsuite branch
Testsuite:master:
  stage: test
  rules: # same can trigger automatically after testsuite-revision
    # there cxx changes -> cancel this job and add the "Testsuite:build" job
    - if: $CFS_PIPELINE_TYPE == "test" || $CFS_PIPELINE_TYPE == "manual"
      changes:
        paths: !reference [.require-rebuild-changes, changes, paths]
        compare_to: !reference [.require-rebuild-changes, changes, compare_to]
      when: never
    # there are only Testsuite changes, no cxx changes -> this rule is reached -> run new testsuite with master build
    - if: $CFS_PIPELINE_TYPE == "test" || $CFS_PIPELINE_TYPE == "manual"
  variables:
    CFS_UPSTREAM_PROJECT: $CI_PROJECT_PATH
    CFS_UPSTREAM_REF_FOR_BUILD_ARTIFACTS: $CI_DEFAULT_BRANCH # last cfs master build
  trigger:
    project: $CI_PROJECT_NAMESPACE/Testsuite
    branch: $CI_COMMIT_REF_NAME
    strategy: depend # only pass when Testsuite pipeline passes
    forward: # forward all variables
      yaml_variables: true
      pipeline_variables: true
  needs:
    - job: testsuite-revision

# add this if we have cxx changes
Testsuite:build:
  stage: test
  rules: # can trigger automatically after testsuite-revision
    # only we have cxx changes
    - if: $CFS_PIPELINE_TYPE == "test" || $CFS_PIPELINE_TYPE == "manual"
      changes:
        paths: !reference [.require-rebuild-changes, changes, paths]
        compare_to: !reference [.require-rebuild-changes, changes, compare_to]
    # for nightly and release we test - all refs point to master
    - if: $CFS_PIPELINE_TYPE == "nightly" || $CFS_PIPELINE_TYPE == "release"
  variables:
    CFS_UPSTREAM_PROJECT: $CI_PROJECT_PATH
    CFS_SHA: $CI_COMMIT_SHA # to check if the build artifacts are correct
  trigger:
    project: $CI_PROJECT_NAMESPACE/Testsuite
    branch: $CI_COMMIT_REF_NAME #same as the parent pipeline, must exist for the trigger to succeed
    strategy: depend # only pass when Testsuite pipeline passes
    forward: # forward all variables
      yaml_variables: true
      pipeline_variables: true
  needs:
    - job: testsuite-revision
    - job: linux:gcc14-musl
    - job: windows:msvc2022